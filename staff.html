<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>路跑打卡系統｜工作人員服務</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3349;--accent:#f97316;--accent2:#fb923c;--green:#22c55e;--red:#ef4444;--text:#e8eaf0;--muted:#6b7280;--mono:'DM Mono',monospace;--sans:'Noto Sans TC',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
.wrap{max-width:560px;margin:0 auto;padding:20px;padding-bottom:90px;}
.header{text-align:center;padding:24px 0 16px;}
.header .logo{font-size:2rem;margin-bottom:4px;}
.header .title{font-size:1.2rem;font-weight:900;}
.header .sub{font-size:.78rem;color:var(--muted);margin-top:2px;}
.tabs{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:12px;gap:4px;}
.tab{flex:1;text-align:center;padding:10px 4px;border-radius:8px;font-size:.82rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;}
.tab.active{background:var(--accent);color:#fff;}
.page{display:none;}
.page.active{display:block;}
.input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:var(--sans);font-size:.92rem;outline:none;transition:border-color .2s;}
.input:focus{border-color:var(--accent);}
.input-group{margin-bottom:14px;}
.input-group label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
.input-row{display:flex;gap:8px;align-items:flex-start;}
.input-row .input{flex:1;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:13px 18px;border-radius:8px;border:none;font-family:var(--sans);font-size:.92rem;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm{padding:6px 12px;font-size:.78rem;border-radius:6px;}
.btn-full{width:100%;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
.csv-hint{font-size:.78rem;color:var(--muted);margin-bottom:16px;padding:10px 12px;background:var(--surface2);border-radius:8px;border-left:3px solid var(--accent);line-height:1.6;}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:700;background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.badge-green{background:rgba(34,197,94,.1);color:var(--green);border-color:rgba(34,197,94,.3);}
.loading-cell{text-align:center;color:var(--muted);padding:30px 10px;font-size:.85rem;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:.88rem;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.4);opacity:0;transition:all .25s;z-index:9999;max-width:90vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.success{border-left:4px solid var(--green);}
.toast.error{border-left:4px solid var(--red);}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">🦺</div>
    <div class="title">路跑打卡系統</div>
    <div class="sub">工作人員服務</div>
  </div>

  <div class="tabs">
    <div class="tab active" data-page="signup" onclick="showPage('signup')">📝 報名</div>
    <div class="tab" data-page="status" onclick="showPage('status')">🔍 查詢報名／修改</div>
  </div>
  <div style="text-align:right;margin-bottom:12px">
    <a href="admin.html?mode=stats" target="_blank" style="font-size:.78rem;color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;gap:4px" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">📊 即時統計 →</a>
  </div>

  <!-- 報名 -->
  <div id="page-signup" class="page active">
    <div id="signupContent"><div class="loading-cell">載入中...</div></div>
  </div>

  <!-- 查詢／修改 -->
  <div id="page-status" class="page">
    <div id="statusContent">
      <div class="loading-cell">載入中...</div>
    </div>
    <div id="statusResult"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, getDoc, getDocs, updateDoc, query, orderBy, where, serverTimestamp, runTransaction, deleteField } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWn7703qi0X6rL2c4WBhieTZ2-_JSrvco",
  authDomain: "road-running-check-in-system.firebaseapp.com",
  projectId: "road-running-check-in-system",
  storageBucket: "road-running-check-in-system.firebasestorage.app",
  messagingSenderId: "19800079371",
  appId: "1:19800079371:web:157af22aa9f1533387db0e"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── HTML escape（防止使用者輸入被當作HTML/JS執行）──
function esc(v) {
  return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escJs(v) {
  return String(v ?? '')
    .replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/\r/g,'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 工具函式 ──
function toHalf(str) {
  if (!str) return str;
  return str.replace(/[！-～]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
            .replace(/　/g, ' ');
}
function applyHalf(el) {
  const v = toHalf(el.value);
  if (v !== el.value) { el.value = v; el.dispatchEvent(new Event('input')); }
}
window.toHalf = toHalf;
window.applyHalf = applyHalf;

function autoSlashDate(el) {
  const isDelete = el._lastLen !== undefined && el.value.length < el._lastLen;
  el._lastLen = el.value.length;
  if (isDelete) return;
  let digits = el.value.replace(/\D/g, '').slice(0, 8);
  let out = digits;
  if (digits.length > 4) out = digits.slice(0,4) + '/' + digits.slice(4);
  if (digits.length > 6) out = digits.slice(0,4) + '/' + digits.slice(4,6) + '/' + digits.slice(6);
  if (out !== el.value) { el.value = out; el._lastLen = out.length; }
}
window.autoSlashDate = autoSlashDate;

// ── 全形→半形：統一監聽所有 input ──
document.addEventListener('input', function(e) {
  const el = e.target;
  const tag = el.tagName;
  const type = (el.type||'').toLowerCase();
  if (tag !== 'INPUT' && tag !== 'TEXTAREA') return;
  if (['checkbox','radio','file','date','datetime-local','time','color','range'].includes(type)) return;
  const v = toHalf(el.value);
  if (v !== el.value) {
    const pos = el.selectionStart;
    el.value = v;
    try { el.setSelectionRange(pos, pos); } catch(e) {}
  }
  if (el.dataset.fmt === 'ymd') autoSlashDate(el);
}, true);

function validateBirthday(v){if(!v)return false;if(!/^\d{4}\/\d{2}\/\d{2}$/.test(v))return false;const[y,m,d]=v.split('/').map(Number);const dt=new Date(y,m-1,d);return dt.getFullYear()===y&&dt.getMonth()===m-1&&dt.getDate()===d;}
function validatePhone(v){return /^09\d{8}$/.test(v);}
function validateEmail(v){if(!v)return true;return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);}
function validateId(v){if(!v)return false;return /^[A-Za-z]\d{9}$/.test(v);}
function setFieldError(id,hasError){const el=document.getElementById(id);if(!el)return;el.style.borderColor=hasError?'var(--red)':'';}
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.classList.remove('show'),3500);}
window.validateBirthday=validateBirthday;
window.validatePhone=validatePhone;
window.validateEmail=validateEmail;
window.validateId=validateId;
window.setFieldError=setFieldError;

// ── 頁籤切換 ──
window.showPage=function(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelector('.tab[data-page="'+id+'"]').classList.add('active');
  if(id==='signup') initSignupPage();
  if(id==='status') initStatusPage();
}

// ════════════════════════════
// 報名
// ════════════════════════════
let signupEvents=[];
let curSignupEvent=null;
let curSignupCustomFields=[];
let lastSignupEventId=null;

// 判斷工作人員報名是否開放（OR 邏輯）
function isStaffRegOpen(ev) {
  const now = Date.now();
  // 條件1：手動開關 ON → 一律可報名
  if (ev.staffRegistrationOpen) return true;
  // 未手動開放：須在時間範圍內才能報名（未設定視為不限制）
  const start = ev.staffRegistrationStartAt?.toDate?.()?.getTime() ?? null;
  const end   = ev.staffRegistrationEndAt?.toDate?.()?.getTime() ?? null;
  const afterStart = (start === null || now >= start);
  const beforeEnd  = (end   === null || now <= end);
  return afterStart && beforeEnd;
}

// 產生報名資訊說明文字
function buildStaffRegInfoHtml(ev) {
  const fmtDT = ts => {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const pad = n => String(n).padStart(2,'0');
    return d.getFullYear()+'/'+pad(d.getMonth()+1)+'/'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
  };
  const lines = [];
  if (ev.staffRegistrationStartAt) lines.push('報名開始：' + fmtDT(ev.staffRegistrationStartAt));
  if (ev.staffRegistrationEndAt)   lines.push('報名截止：' + fmtDT(ev.staffRegistrationEndAt));
  return lines.length ? lines.map(l=>'<div style="font-size:.75rem;color:var(--muted);margin-top:3px">'+l+'</div>').join('') : '';
}

async function initSignupPage(){
  signupEvents=[];
  const content=document.getElementById('signupContent');
  content.innerHTML='<div class="card"><div class="loading-cell">載入中...</div></div>';
  const snap=await getDocs(query(collection(db,'events'), orderBy('createdAt','desc')));
  signupEvents=snap.docs.map(d=>({id:d.id,...d.data()})).filter(ev=>isStaffRegOpen(ev));
  if(!signupEvents.length){content.innerHTML='<div class="card"><div class="loading-cell">目前沒有開放工作人員報名的賽事</div></div>';return;}
  if(signupEvents.length===1){await selectSignupEvent(signupEvents[0].id);}
  else{
    let html='<div class="card"><div class="input-group"><label>選擇賽事</label><select id="signupEventSelect" class="input" onchange="onSignupEventSelect()">';
    html+='<option value="">請選擇...</option>';
    signupEvents.forEach(ev=>{
      const selected=(lastSignupEventId&&ev.id===lastSignupEventId)?' selected':'';
      html+='<option value="'+ev.id+'"'+selected+'>'+esc(ev.name)+(ev.date?'（'+esc(ev.date)+'）':'')+'</option>';
    });
    html+='</select></div></div><div id="signupForm"></div>';
    content.innerHTML=html;
    if(lastSignupEventId&&signupEvents.find(e=>e.id===lastSignupEventId)){
      await selectSignupEvent(lastSignupEventId, true);
    }
  }
}
window.onSignupEventSelect=async function(){
  const id=document.getElementById('signupEventSelect').value;
  if(!id){document.getElementById('signupForm').innerHTML='';return;}
  await selectSignupEvent(id,true);
}
async function selectSignupEvent(eventId,keepWrapper){
  curSignupEvent=signupEvents.find(e=>e.id===eventId);
  lastSignupEventId=eventId;
  curSignupCustomFields=curSignupEvent.staffCustomFields||[];
  let formHtml='';
  // 圖片永遠顯示在最上方
  if(curSignupEvent.staffBannerUrl){
    formHtml+='<div style="margin-bottom:12px"><img src="'+esc(curSignupEvent.staffBannerUrl)+'" style="max-width:100%;border-radius:12px;display:block" onerror="this.style.display=\'none\'"></div>';
  }
  // 賽事資訊卡（含報名時間，無論單/多賽事都顯示）
  const regInfo=buildStaffRegInfoHtml(curSignupEvent);
  formHtml+='<div class="card" style="text-align:center;margin-bottom:12px"><strong>'+esc(curSignupEvent.name)+'</strong>'
    +(curSignupEvent.date?'<div style="font-size:.78rem;color:var(--muted);margin-top:4px">'+esc(curSignupEvent.date)+'</div>':'')
    +(regInfo?'<div style="margin-top:8px;text-align:left">'+regInfo+'</div>':'')
    +'</div>';
  formHtml+='<div class="card">';
  formHtml+='<div class="input-group"><label>姓名 *</label><input id="suName" type="text" class="input" placeholder="王小明"></div>';
  formHtml+='<div class="input-group"><label>性別 *</label><select id="suGender" class="input"><option value="">請選擇...</option><option value="男">男</option><option value="女">女</option></select></div>';
  formHtml+='<div class="input-group"><label>生日（yyyy/mm/dd）*</label>';
  formHtml+='<div class="input-row"><input id="suBirthday" data-fmt="ymd" type="text" class="input" placeholder="yyyy/mm/dd" onblur="setFieldError(\'suBirthday\',!validateBirthday(this.value.trim()))">';
  formHtml+='<button type="button" class="btn btn-ghost btn-sm" onclick="var _d=document.getElementById(\'suBirthdayPicker\');_d.showPicker?_d.showPicker():_d.click()">📅</button>';
  formHtml+='<input type="date" id="suBirthdayPicker" style="display:none" onchange="if(this.value){const[y,m,d]=this.value.split(\'-\');document.getElementById(\'suBirthday\').value=y+\'/\'+m+\'/\'+d;setFieldError(\'suBirthday\',false);this.value=\'\'}"></div></div>';
  formHtml+='<div class="input-group"><label>身分證字號（1英文+9數字）*</label><input id="suIdNumber" type="text" class="input" placeholder="A123456789" onblur="setFieldError(\'suIdNumber\',!validateId(this.value.trim()))"></div>';
  // staffFieldSettings 控制手機和 Email 的顯示與必填
  const sfs=curSignupEvent.staffFieldSettings||{};
  const sPhoneShow=sfs.phone?.show!==false;
  const sPhoneReq=sfs.phone?.required===true;
  const sEmailShow=sfs.email?.show!==false;
  const sEmailReq=sfs.email?.required===true;
  if(sPhoneShow) formHtml+='<div class="input-group"><label>手機號碼'+(sPhoneReq?' *':'')+'</label><input id="suPhone" type="tel" class="input" placeholder="0912345678" onblur="if(this.value.trim())setFieldError(\'suPhone\',!validatePhone(this.value.trim()))"></div>';
  if(sEmailShow) formHtml+='<div class="input-group"><label>E-Mail'+(sEmailReq?' *':'')+'</label><input id="suEmail" type="email" class="input" placeholder="example@email.com" onblur="if(this.value.trim())setFieldError(\'suEmail\',!validateEmail(this.value.trim()))"></div>';
  formHtml+='<div class="input-group"><label>備註</label><input id="suNote" type="text" class="input"></div>';
  // 自訂欄位
  curSignupCustomFields.forEach(f=>{
    const id='su_cf_'+f.id; const reqMark=f.required?' *':'';
    if(f.type==='select'){
      formHtml+='<div class="input-group"><label>'+esc(f.label)+reqMark+'</label><select id="'+id+'" class="input"><option value="">請選擇...</option>';
      (f.options||[]).forEach(o=>{formHtml+='<option value="'+esc(o)+'">'+esc(o)+'</option>';});
      formHtml+='</select></div>';
    }else if(f.type==='checkbox'){
      formHtml+='<div class="input-group"><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="'+id+'"> '+esc(f.label)+'</label></div>';
    }else{
      formHtml+='<div class="input-group"><label>'+esc(f.label)+reqMark+'</label><input id="'+id+'" type="text" class="input"></div>';
    }
  });
  formHtml+='<button class="btn btn-primary btn-full" onclick="submitSignup()">送出報名</button></div>';
  if(keepWrapper){document.getElementById('signupForm').innerHTML=formHtml;}
  else{document.getElementById('signupContent').innerHTML=formHtml;}
}

window.submitSignup=async function(){
  const eventId=curSignupEvent.id;
  const sfs=curSignupEvent.staffFieldSettings||{};
  const sPhoneShow=sfs.phone?.show!==false;
  const sPhoneReq=sfs.phone?.required===true;
  const sEmailShow=sfs.email?.show!==false;
  const sEmailReq=sfs.email?.required===true;
  const name=document.getElementById('suName').value.trim();
  const gender=document.getElementById('suGender').value;
  const birthday=document.getElementById('suBirthday').value.trim();
  const idNumber=document.getElementById('suIdNumber').value.trim();
  const phone=sPhoneShow?(document.getElementById('suPhone')?.value.trim()||''):'';
  const email=sEmailShow?(document.getElementById('suEmail')?.value.trim()||''):'';
  const note=document.getElementById('suNote').value.trim();
  if(!name){showToast('請填寫姓名','error');return;}
  if(!gender){showToast('請選擇性別','error');return;}
  if(!birthday||!validateBirthday(birthday)){setFieldError('suBirthday',true);showToast('請填寫正確的生日格式','error');return;}
  if(!idNumber||!validateId(idNumber)){setFieldError('suIdNumber',true);showToast('請填寫正確的身分證字號','error');return;}
  if(sPhoneShow){
    if(sPhoneReq&&!phone){setFieldError('suPhone',true);showToast('請填寫手機號碼','error');return;}
    if(phone&&!validatePhone(phone)){setFieldError('suPhone',true);showToast('手機號碼格式錯誤','error');return;}
  }
  if(sEmailShow){
    if(sEmailReq&&!email){setFieldError('suEmail',true);showToast('請填寫 E-Mail','error');return;}
    if(email&&!validateEmail(email)){setFieldError('suEmail',true);showToast('Email格式錯誤','error');return;}
  }
  // 自訂欄位
  const customData={};
  for(const f of curSignupCustomFields){
    const el=document.getElementById('su_cf_'+f.id); if(!el)continue;
    if(f.type==='checkbox'){customData[f.id]=el.checked;}
    else{const v=el.value.trim();if(f.required&&!v){showToast('「'+f.label+'」為必填','error');return;}customData[f.id]=v;}
  }
  const runnerData={name,gender,birthday,phone,email,idNumber,note};
  const btn=document.querySelector('#signupContent .btn-primary, #signupForm .btn-primary');
  btn.textContent='送出中...'; btn.disabled=true;
  try{
    // 用身分證字號當這場賽事工作人員報名記錄的文件ID，包進transaction做「不存在才寫入」
    // 取代原本「先查詢、查無才寫入」的寫法，避免兩個分頁或兩次快速送出同一張身分證時都通過檢查、造成重複報名
    const staffRef=doc(db,'events',eventId,'staff',idNumber);
    let reactivated=false;
    await runTransaction(db, async tx=>{
      const existing=await tx.get(staffRef);
      if(existing.exists()){
        if(!existing.data().cancelRequested) throw new Error('DUP_SIGNUP');
        // 之前申請取消但尚未經審核，視為撤回申請、重新啟用此筆報名
        reactivated=true;
      }
      tx.set(staffRef,{
        name,gender,birthday,phone,email,idNumber,note,customData,
        createdAt:existing.exists()?(existing.data().createdAt||serverTimestamp()):serverTimestamp(),
        updatedAt:serverTimestamp()
      });
    });
    const content=document.getElementById('signupContent');
    content.innerHTML='<div class="card" style="text-align:center">'
      +'<div style="font-size:2.5rem;margin-bottom:8px">✅</div>'
      +'<div style="font-size:1.05rem;font-weight:900;margin-bottom:4px">'+(reactivated?'已重新啟用報名！':'報名成功！')+'</div>'
      +'<div style="font-size:.82rem;color:var(--muted)">'+esc(curSignupEvent.name)+'</div>'
      +'<div style="margin-top:16px;font-size:.88rem">'+esc(name)+'　'+esc(gender)+'　'+esc(birthday)+'</div>'
      +(reactivated?'<div class="csv-hint" style="margin-top:12px;text-align:left">您先前的取消申請已自動撤回。</div>':'')
      +'<div class="csv-hint" style="margin-top:16px;text-align:left">如需查詢 / 修改，請至「查詢報名／修改」分頁輸入身分證字號查詢 / 修改。</div>'
      +'</div>';
  }catch(e){
    if(e.message==='DUP_SIGNUP'){showToast('您已報名過此賽事','error');btn.textContent='送出報名';btn.disabled=false;return;}
    showToast('報名失敗：'+e.message,'error');btn.textContent='送出報名';btn.disabled=false;
  }
}

// ════════════════════════════
// 查詢／修改
// ════════════════════════════
let allStatusEvents=[];
let curStatusEvent=null;
let lastStatusEventId=null;

async function initStatusPage(){
  const content=document.getElementById('statusContent');
  content.innerHTML='<div class="card"><div class="loading-cell">載入中...</div></div>';
  const snap=await getDocs(query(collection(db,'events'),orderBy('createdAt','desc')));
  allStatusEvents=snap.docs.map(d=>({id:d.id,...d.data()}));
  if(!allStatusEvents.length){
    content.innerHTML='<div class="card"><div class="loading-cell">目前沒有賽事資料</div></div>';
    return;
  }
  if(allStatusEvents.length===1){
    await selectStatusEvent(allStatusEvents[0].id);
  } else {
    let html='<div class="card"><div class="input-group"><label>選擇賽事</label>'
      +'<select id="statusEventSelect" class="input" onchange="onStatusEventSelect()">'
      +'<option value="">請選擇...</option>';
    allStatusEvents.forEach(ev=>{
      const selected=(lastStatusEventId&&ev.id===lastStatusEventId)?' selected':'';
      html+='<option value="'+ev.id+'"'+selected+'>'+esc(ev.name)+(ev.date?'（'+esc(ev.date)+'）':'')+'</option>';
    });
    html+='</select></div></div><div id="statusForm"></div>';
    content.innerHTML=html;
    if(lastStatusEventId&&allStatusEvents.find(e=>e.id===lastStatusEventId)){
      await selectStatusEvent(lastStatusEventId, true);
    }
  }
}

window.onStatusEventSelect=async function(){
  const id=document.getElementById('statusEventSelect').value;
  document.getElementById('statusResult').innerHTML='';
  if(!id){document.getElementById('statusForm').innerHTML='';curStatusEvent=null;lastStatusEventId=null;return;}
  await selectStatusEvent(id, true);
}

async function selectStatusEvent(eventId, keepWrapper){
  curStatusEvent=allStatusEvents.find(e=>e.id===eventId);
  lastStatusEventId=eventId;
  document.getElementById('statusResult').innerHTML='';
  const formHtml='<div class="card">'
    +'<div class="csv-hint">輸入身分證字號查詢報名記錄，開放報名期間可修改資料。</div>'
    +'<div class="input-group"><label>身分證字號</label>'
    +'<input id="statusIdNum" type="text" class="input" placeholder="A123456789" oninput="applyHalf(this)"></div>'
    +'<button class="btn btn-primary btn-full" onclick="doStatusQuery()">🔍 查詢報名</button>'
    +'</div>';
  if(keepWrapper){
    document.getElementById('statusForm').innerHTML=formHtml;
  } else {
    document.getElementById('statusContent').innerHTML=formHtml;
  }
}

window.doStatusQuery=async function(){
  if(!curStatusEvent){showToast('請先選擇賽事','error');return;}
  const idNum=document.getElementById('statusIdNum').value.trim();
  const result=document.getElementById('statusResult');
  if(!idNum){showToast('請輸入身分證字號','error');return;}
  if(!validateId(idNum)){showToast('身分證字號格式錯誤','error');return;}
  result.innerHTML='<div class="card"><div class="loading-cell">查詢中...</div></div>';

  const eventId=curStatusEvent.id;
  const ev=curStatusEvent;
  const staffSnap=await getDocs(query(collection(db,'events',eventId,'staff'),where('idNumber','==',idNum)));
  if(staffSnap.empty){result.innerHTML='<div class="card"><div class="loading-cell">查無報名記錄</div></div>';return;}

  let html='';
  for(const eDocRef of staffSnap.docs){
    const e=eDocRef.data();
    const cardId='sCard_'+eventId+'_'+eDocRef.id;
    html+='<div class="card" id="'+cardId+'">';
    html+='<div style="font-size:.78rem;color:var(--muted);margin-bottom:8px">'+esc(ev.name)+(ev.date?'　'+esc(ev.date):'')+'</div>';
    html+='<div style="font-size:1rem;font-weight:700;margin-bottom:4px">'+esc(e.name)+'</div>';
    html+='<div style="font-size:.82rem;color:var(--muted)">'+esc(e.gender)+'　'+esc(e.birthday)+(e.phone?'　'+esc(e.phone):'')+'</div>';
    if(isStaffRegOpen(ev)){
      if(e.cancelRequested){
        html+='<div id="'+cardId+'_actions">';
        html+='<div style="padding:10px 12px;background:var(--surface2);border-radius:8px;font-size:.82rem;color:var(--muted);margin-bottom:8px">⏳ 已送出取消申請，請等待主辦方確認</div>';
        html+='<button class="btn btn-ghost btn-full" onclick="withdrawStaffCancelRequest(\''+eventId+'\',\''+eDocRef.id+'\',\''+cardId+'\')">↩️ 撤銷取消申請</button>';
        html+='</div>';
      } else {
        html+='<div id="'+cardId+'_actions">';
        html+='<div style="display:flex;gap:8px;margin-top:12px">';
        html+='<button class="btn btn-ghost btn-sm" onclick="showEditForm(\''+eventId+'\',\''+eDocRef.id+'\',\''+cardId+'\')">✏️ 修改資料</button>';
        html+='<button class="btn btn-danger btn-sm" onclick="requestCancelStaffEntry(\''+eventId+'\',\''+eDocRef.id+'\',\''+cardId+'\')">🗑️ 申請取消報名</button>';
        html+='</div>';
        html+='<div id="'+cardId+'_edit"></div>';
        html+='</div>';
      }
    }
    html+='</div>';
  }
  result.innerHTML=html;
}
// ── 撤銷取消申請 ──
window.withdrawStaffCancelRequest=async function(eventId, staffDocId, cardId){
  try{
    await updateDoc(doc(db,'events',eventId,'staff',staffDocId),{
      cancelRequested:deleteField(), cancelRequestedAt:deleteField(), updatedAt:serverTimestamp()
    });
    const actions=document.getElementById(cardId+'_actions');
    if(actions) actions.outerHTML='<div id="'+cardId+'_actions">'
      +'<div style="display:flex;gap:8px;margin-top:12px">'
      +'<button class="btn btn-ghost btn-sm" onclick="showEditForm(\''+eventId+'\',\''+staffDocId+'\',\''+cardId+'\')">✏️ 修改資料</button>'
      +'<button class="btn btn-danger btn-sm" onclick="requestCancelStaffEntry(\''+eventId+'\',\''+staffDocId+'\',\''+cardId+'\')">🗑️ 申請取消報名</button>'
      +'</div><div id="'+cardId+'_edit"></div></div>';
    showToast('已撤銷取消申請');
  }catch(e){
    showToast('撤銷失敗：'+e.message,'error');
  }
}

window.requestCancelStaffEntry=async function(eventId, staffDocId, cardId){
  if(!confirm('確定要送出取消報名申請？\n（送出後請等待主辦方審核確認，不會立即取消）'))return;
  try{
    await updateDoc(doc(db,'events',eventId,'staff',staffDocId),{
      cancelRequested:true, cancelRequestedAt:serverTimestamp()
    });
    const actions=document.getElementById(cardId+'_actions');
    if(actions) actions.outerHTML='<div style="margin-top:12px;padding:10px 12px;background:var(--surface2);border-radius:8px;font-size:.82rem;color:var(--muted)">⏳ 已送出取消申請，請等待主辦方確認</div>';
    showToast('已送出取消申請');
  }catch(e){
    showToast('申請失敗：'+e.message,'error');
  }
}

window.showEditForm=async function(eventId,staffDocId,cardId){
  const box=document.getElementById(cardId+'_edit');
  if(box.dataset.open==='1'){box.innerHTML='';box.dataset.open='';return;}
  box.dataset.open='1';
  const sSnap=await getDoc(doc(db,'events',eventId,'staff',staffDocId));
  const e=sSnap.data()||{};
  const evDoc=await getDoc(doc(db,'events',eventId));
  const customFields=evDoc.data()?.staffCustomFields||[];
  const cd=e.customData||{};
  let html='<div class="card" style="background:var(--surface2);margin-top:12px">';
  html+='<div class="csv-hint">如需修改身分證字號，請直接填入正確號碼。</div>';
  html+='<div class="input-group"><label>姓名 *</label><input id="'+cardId+'_name" type="text" class="input" value="'+esc(e.name||'')+'"></div>';
  html+='<div class="input-group"><label>性別 *</label><select id="'+cardId+'_gender" class="input"><option value="男"'+(e.gender==='男'?' selected':'')+'>男</option><option value="女"'+(e.gender==='女'?' selected':'')+'>女</option></select></div>';
  html+='<div class="input-group"><label>生日 *</label>'
    +'<div class="input-row">'
    +'<input id="'+cardId+'_birthday" data-fmt="ymd" type="text" class="input" value="'+esc(e.birthday||'')+'" oninput="applyHalf(this)">'
    +'<button type="button" class="btn btn-ghost btn-sm" onclick="var _d=document.getElementById(\''+cardId+'_birthdayPicker\');_d.showPicker?_d.showPicker():_d.click()">📅</button>'
    +'<input type="date" id="'+cardId+'_birthdayPicker" style="display:none" '
    +'onchange="if(this.value){const[y,m,d]=this.value.split(\'-\');document.getElementById(\''+cardId+'_birthday\').value=y+\'/\'+m+\'/\'+d;this.value=\'\'}">'
    +'</div></div>';
  html+='<div class="input-group"><label>身分證字號 *</label><input id="'+cardId+'_idNumber" type="text" class="input" value="'+esc(e.idNumber||'')+'" oninput="applyHalf(this)"></div>';
  html+='<div class="input-group"><label>手機</label><input id="'+cardId+'_phone" type="tel" class="input" value="'+esc(e.phone||'')+'" oninput="applyHalf(this)"></div>';
  html+='<div class="input-group"><label>Email</label><input id="'+cardId+'_email" type="email" class="input" value="'+esc(e.email||'')+'" oninput="applyHalf(this)"></div>';
  html+='<div class="input-group"><label>備註</label><input id="'+cardId+'_note" type="text" class="input" value="'+esc(e.note||'')+'"></div>';
  customFields.forEach(f=>{
    const fid=cardId+'_cf_'+f.id;
    if(f.type==='select'){
      html+='<div class="input-group"><label>'+esc(f.label)+'</label><select id="'+fid+'" class="input"><option value="">請選擇...</option>';
      (f.options||[]).forEach(o=>{html+='<option value="'+esc(o)+'"'+(cd[f.id]===o?' selected':'')+'>'+esc(o)+'</option>';});
      html+='</select></div>';
    }else if(f.type==='checkbox'){
      html+='<div class="input-group"><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="'+fid+'" '+(cd[f.id]?'checked':'')+'> '+esc(f.label)+'</label></div>';
    }else{
      html+='<div class="input-group"><label>'+esc(f.label)+'</label><input id="'+fid+'" type="text" class="input" value="'+esc(cd[f.id]||'')+'"></div>';
    }
  });
  html+='<button class="btn btn-primary btn-full" onclick="saveEdit(\''+eventId+'\',\''+staffDocId+'\',\''+cardId+'\')">儲存修改</button>';
  html+='</div>';
  box.innerHTML=html;
  box.dataset.customFields=JSON.stringify(customFields);
}

window.saveEdit=async function(eventId,staffDocId,cardId){
  const name=document.getElementById(cardId+'_name').value.trim();
  const gender=document.getElementById(cardId+'_gender').value;
  const birthday=document.getElementById(cardId+'_birthday').value.trim();
  const idNumber=document.getElementById(cardId+'_idNumber').value.trim();
  const phone=document.getElementById(cardId+'_phone').value.trim();
  const email=document.getElementById(cardId+'_email').value.trim();
  const note=document.getElementById(cardId+'_note').value.trim();
  if(!name){showToast('姓名為必填','error');return;}
  if(!gender){showToast('性別為必選','error');return;}
  if(!birthday||!validateBirthday(birthday)){showToast('生日格式錯誤','error');return;}
  if(!idNumber||!validateId(idNumber)){showToast('身分證字號格式錯誤','error');return;}
  if(phone&&!validatePhone(phone)){showToast('手機號碼格式錯誤','error');return;}
  if(email&&!validateEmail(email)){showToast('Email格式錯誤','error');return;}
  const customFields=JSON.parse(document.getElementById(cardId+'_edit').dataset.customFields||'[]');
  const customData={};
  for(const f of customFields){
    const el=document.getElementById(cardId+'_cf_'+f.id); if(!el)continue;
    if(f.type==='checkbox')customData[f.id]=el.checked;
    else{if(f.required&&!el.value.trim()){showToast('「'+f.label+'」為必填','error');return;}customData[f.id]=el.value.trim();}
  }
  try{
    await updateDoc(doc(db,'events',eventId,'staff',staffDocId),{name,gender,birthday,idNumber,phone,email,note,customData,updatedAt:serverTimestamp()});
    showToast('已儲存修改');
    document.getElementById(cardId+'_edit').innerHTML='<div class="csv-hint" style="margin-top:12px">✅ 修改已儲存，如有修改身分證，下次請用新號碼查詢。</div>';
  }catch(err){showToast('儲存失敗：'+err.message,'error');}
}

initSignupPage();
</script>
