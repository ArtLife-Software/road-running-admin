<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>路跑打卡系統｜選手服務</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3349;--accent:#f97316;--accent2:#fb923c;--green:#22c55e;--red:#ef4444;--text:#e8eaf0;--muted:#6b7280;--mono:'DM Mono',monospace;--sans:'Noto Sans TC',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
.wrap{max-width:560px;margin:0 auto;padding:20px;padding-bottom:90px;}
.header{text-align:center;padding:24px 0 16px;}
.header .logo{font-size:2rem;margin-bottom:4px;}
.header .title{font-size:1.2rem;font-weight:900;}
.header .sub{font-size:.78rem;color:var(--muted);margin-top:2px;}
.tabs{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:20px;gap:4px;}
.tab{flex:1;text-align:center;padding:10px 4px;border-radius:8px;font-size:.82rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;}
.tab.active{background:var(--accent);color:#fff;}
.page{display:none;}
.page.active{display:block;}
.input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:var(--sans);font-size:.92rem;outline:none;transition:border-color .2s;}
.input:focus{border-color:var(--accent);}
.input-group{margin-bottom:14px;}
.input-group label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
.input-row{display:flex;gap:8px;align-items:flex-start;}
.input-row .input{flex:1;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:13px 18px;border-radius:8px;border:none;font-family:var(--sans);font-size:.92rem;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm{padding:6px 12px;font-size:.78rem;border-radius:6px;}
.btn-full{width:100%;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
.csv-hint{font-size:.78rem;color:var(--muted);margin-bottom:16px;padding:10px 12px;background:var(--surface2);border-radius:8px;border-left:3px solid var(--accent);line-height:1.6;}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:700;background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.badge-green{background:rgba(34,197,94,.1);color:var(--green);border-color:rgba(34,197,94,.3);}
.runner-card-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;font-size:.95rem;}
.station-stats{display:flex;flex-direction:column;gap:8px;}
.station-num{background:var(--accent);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;}
.loading-cell{text-align:center;color:var(--muted);padding:30px 10px;font-size:.85rem;}
.qr-box{display:flex;flex-direction:column;align-items:center;gap:12px;padding:20px;background:#fff;border-radius:12px;margin-top:12px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:.88rem;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.4);opacity:0;transition:all .25s;z-index:9999;max-width:90vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.success{border-left:4px solid var(--green);}
.toast.error{border-left:4px solid var(--red);}
.status-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:700;}
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div class="logo">🏃</div>
    <div class="title">路跑打卡系統</div>
    <div class="sub">選手服務</div>
  </div>

  <div class="tabs">
    <div class="tab active" data-page="signup" onclick="showPage('signup')">📝 報名</div>

  </div>

  </div>

  <!-- ════════ 報名 ════════ -->
  <div id="page-signup" class="page active">
    <div id="signupContent">

  <!-- ════════ 查詢報名結果 ════════ -->

    <div id="statusContent">

    <div id="statusResult"></div>

  <!-- ════════ 查詢成績 ════════ -->
  <div id="page-lookup" class="page">
    <div class="card">
      <div class="csv-hint">ID 和身分證字號填寫其中一項即可，兩項都填寫時，符合任一項即可查詢。</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:12px">
        <div class="input-group" style="margin:0"><label>ID</label><input id="lookupId" type="text" class="input" placeholder="R0001" oninput="applyHalf(this)"></div>
        <div class="input-group" style="margin:0"><label>身分證字號</label><input id="lookupIdNum" type="text" class="input" placeholder="A123456789" oninput="applyHalf(this)"></div>
      </div>
      <div class="input-group"><label>生日（yyyy/mm/dd）*</label><div class="input-row"><input id="lookupBirthday" data-fmt="ymd" type="text" class="input" placeholder="1990/01/01" oninput="applyHalf(this)"><button type="button" class="btn btn-ghost btn-sm" onclick="var _d=document.getElementById('lookupBirthdayPicker');_d.showPicker?_d.showPicker():_d.click()">📅</button><input type="date" id="lookupBirthdayPicker" style="display:none" onchange="if(this.value){const[y,m,d]=this.value.split('-');document.getElementById('lookupBirthday').value=y+'/'+m+'/'+d;this.value=''}"></div></div>
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <div class="input-group" id="lookupEventRow" style="margin:0;flex:1;min-width:160px"><label>選擇賽事</label><select id="lookupEventSelect" class="input"><option value="">請選擇賽事...</option></select></div>
        <label style="display:flex;align-items:center;gap:6px;font-size:.85rem;cursor:pointer;white-space:nowrap;margin-top:18px">
          <input type="checkbox" id="lookupAllEvents" onchange="onLookupAllEventsChange()">
          歷次賽事
        </label>
      </div>
      <button class="btn btn-primary btn-full" style="margin-top:8px" onclick="doLookup()">🔍 查詢成績</button>
    </div>
    <div id="lookupResult"></div>
  </div>

</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, query, orderBy, where, serverTimestamp, writeBatch, deleteField } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWn7703qi0X6rL2c4WBhieTZ2-_JSrvco",
  authDomain: "road-running-check-in-system.firebaseapp.com",
  projectId: "road-running-check-in-system",
  storageBucket: "road-running-check-in-system.firebasestorage.app",
  messagingSenderId: "19800079371",
  appId: "1:19800079371:web:157af22aa9f1533387db0e"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── HTML escape（防止使用者輸入被當作HTML/JS執行）──
function esc(v) {
  return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escJs(v) {
  return String(v ?? '')
    .replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/\r/g,'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
// ── 只查指定 uniqueId 的選手主檔，取代整個 runners 集合全表掃描 ──
async function fetchRunnersByUniqueIds(uniqueIds) {
  const ids = [...new Set((uniqueIds||[]).filter(Boolean))];
  const map = {};
  if (!ids.length) return map;
  const chunks = [];
  for (let i=0; i<ids.length; i+=30) chunks.push(ids.slice(i, i+30));
  const snaps = await Promise.all(chunks.map(c=>getDocs(query(collection(db,'runners'), where('uniqueId','in',c)))));
  snaps.forEach(snap=>snap.docs.forEach(d=>{ const r=d.data(); if(r.uniqueId) map[r.uniqueId]=r; }));
  return map;
}

// ── 工具函式 ──
function fmt(ts) {
  if (!ts) return '-';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString('zh-TW', {hour12:false});
}
function diffHMS(a, b) {
  if (!a || !b) return '-';
  const da = a.toDate ? a.toDate() : new Date(a);
  const db2 = b.toDate ? b.toDate() : new Date(b);
  const s = Math.max(0, Math.floor((da - db2) / 1000));
  return String(Math.floor(s/3600)).padStart(2,'0')+':'+String(Math.floor((s%3600)/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}
function toHalf(str) {
  if (!str) return str;
  return str.replace(/[！-～]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
            .replace(/　/g, ' ');
}
function applyHalf(el) {
  const v = toHalf(el.value);
  if (v !== el.value) { el.value = v; el.dispatchEvent(new Event('input')); }
}
window.toHalf = toHalf;
window.applyHalf = applyHalf;

function autoSlashDate(el) {
  const isDelete = el._lastLen !== undefined && el.value.length < el._lastLen;
  el._lastLen = el.value.length;
  if (isDelete) return;
  let digits = el.value.replace(/\D/g, '').slice(0, 8);
  let out = digits;
  if (digits.length > 4) out = digits.slice(0,4) + '/' + digits.slice(4);
  if (digits.length > 6) out = digits.slice(0,4) + '/' + digits.slice(4,6) + '/' + digits.slice(6);
  if (out !== el.value) { el.value = out; el._lastLen = out.length; }
}
window.autoSlashDate = autoSlashDate;

// ── 全形→半形：統一監聽所有 input ──
document.addEventListener('input', function(e) {
  const el = e.target;
  const tag = el.tagName;
  const type = (el.type||'').toLowerCase();
  if (tag !== 'INPUT' && tag !== 'TEXTAREA') return;
  if (['checkbox','radio','file','date','datetime-local','time','color','range'].includes(type)) return;
  const v = toHalf(el.value);
  if (v !== el.value) {
    const pos = el.selectionStart;
    el.value = v;
    try { el.setSelectionRange(pos, pos); } catch(e) {}
  }
  if (el.dataset.fmt === 'ymd') autoSlashDate(el);
}, true);

function validateBirthday(v) {
  if (!v) return true; // 空值由呼叫端決定是否必填
  if (!/^\d{4}\/\d{2}\/\d{2}$/.test(v)) return false;
  const [y,m,d] = v.split('/').map(Number);
  const dt = new Date(y,m-1,d);
  if(dt.getFullYear()!==y||dt.getMonth()!==m-1||dt.getDate()!==d) return false;
  if(y<1900) return false;
  const today=new Date(); today.setHours(0,0,0,0);
  if(dt>=today) return false; // 不能是今天或未來
  return true;
}
window.validateBirthday=validateBirthday;
function validatePhone(v) { return /^09\d{8}$/.test(v); }
function validateEmail(v) {
  if (!v) return true;
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
}
function validateId(v) {
  if (!v) return true;
  return /^[A-Za-z]\d{9}$/.test(v);
}
function setFieldError(id, hasError) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.borderColor = hasError ? 'var(--red)' : '';
}
function isSamePerson(a, b) {
  if (a.idNumber && b.idNumber) return a.idNumber === b.idNumber;
  if (a.gender && b.gender && a.gender !== b.gender) return false;
  if (a.birthday && b.birthday && a.birthday !== b.birthday) return false;
  const nameMatch = a.name && b.name && a.name === b.name;
  const phoneMatch = a.phone && b.phone && a.phone === b.phone;
  const emailMatch = a.email && b.email && a.email === b.email;
  if (nameMatch && (phoneMatch || emailMatch)) return true;
  let cnt = 0;
  ['name','gender','birthday','phone','email'].forEach(f => { if (a[f]&&b[f]&&a[f]===b[f]) cnt++; });
  return cnt >= 3;
}
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+type;
  setTimeout(()=>t.classList.remove('show'),3500);
}
// qrcodejs 對多位元組(中文)字元處理有bug，需先轉換為UTF-8位元組序列
function utf16to8(str){
  let out='';
  for(let i=0;i<str.length;i++){
    const c=str.charCodeAt(i);
    if(c>=0x0001&&c<=0x007F){
      out+=str.charAt(i);
    }else if(c>0x07FF){
      out+=String.fromCharCode(0xE0|((c>>12)&0x0F));
      out+=String.fromCharCode(0x80|((c>>6)&0x3F));
      out+=String.fromCharCode(0x80|((c>>0)&0x3F));
    }else{
      out+=String.fromCharCode(0xC0|((c>>6)&0x1F));
      out+=String.fromCharCode(0x80|((c>>0)&0x3F));
    }
  }
  return out;
}
function makeQRCode(el,text,size){
  el.innerHTML='';
  new QRCode(el,{text:utf16to8(text),width:size,height:size});
}

// ── 頁籤切換 ──
window.showPage=function(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelector('.tab[data-page="'+id+'"]').classList.add('active');
  if(id==='lookup') initLookupPage();
  if(id==='signup') initSignupPage();
  if(id==='status') initStatusPage();
}

// ════════════════════════════
// 報名表單
// ════════════════════════════
let signupEvents=[]; // 開放報名的賽事清單
let curSignupEvent=null;
let curSignupCustomFields=[];
let lastSignupEventId=null; // 記住上次選的賽事

// 判斷選手報名是否開放（OR 邏輯：任一條件符合即開放）
function isRunnerRegOpen(ev, entryCount) {
  const now = Date.now();
  // 條件1：手動開關 ON → 一律可報名
  if (ev.registrationOpen) return true;
  // 未手動開放：須同時符合「時間範圍內」且「人數未滿」才能報名
  // 時間範圍：未設定視為不限制（通過）
  const start = ev.registrationStartAt?.toDate?.()?.getTime() ?? null;
  const end   = ev.registrationEndAt?.toDate?.()?.getTime() ?? null;
  const afterStart = (start === null || now >= start);
  const beforeEnd  = (end   === null || now <= end);
  const inTimeRange = afterStart && beforeEnd;
  // 人數上限：0 或未設定視為不限制（通過）
  const cap = ev.registrationCapacity ?? 0;
  const underCapacity = (cap === 0 || entryCount < cap);
  return inTimeRange && underCapacity;
}

// 產生報名資訊說明文字（顯示在賽事資訊卡）
function buildRegInfoHtml(ev, entryCount) {
  const fmtDT = ts => {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const pad = n => String(n).padStart(2,'0');
    return d.getFullYear()+'/'+pad(d.getMonth()+1)+'/'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
  };
  const lines = [];
  if (ev.registrationStartAt) lines.push('報名開始：' + fmtDT(ev.registrationStartAt));
  if (ev.registrationEndAt)   lines.push('報名截止：' + fmtDT(ev.registrationEndAt));
  const cap = ev.registrationCapacity ?? 0;
  if (cap > 0) lines.push('報名人數：' + entryCount + ' / ' + cap);
  return lines.length ? lines.map(l=>'<div style="font-size:.75rem;color:var(--muted);margin-top:3px">'+l+'</div>').join('') : '';
}

async function initSignupPage(){
  signupEvents=[];
  const content=document.getElementById('signupContent');
  content.innerHTML='<div class="card"><div class="loading-cell">載入中...</div></div>';
  // 取得所有賽事，由前端做開放判斷
  const snap=await getDocs(query(collection(db,'events'), orderBy('createdAt','desc')));
  const openEvents=[];
  for(const d of snap.docs){
    const ev={id:d.id,...d.data()};
    // 取目前報名人數
    const entrySnap=await getDocs(collection(db,'events',d.id,'runners'));
    ev._entryCount = entrySnap.size;
    if(isRunnerRegOpen(ev, ev._entryCount)) openEvents.push(ev);
  }
  signupEvents=openEvents;
  if(!signupEvents.length){
    content.innerHTML='<div class="card"><div class="loading-cell">目前沒有開放報名的賽事</div></div>';
    return;
  }
  if(signupEvents.length===1){
    await selectSignupEvent(signupEvents[0].id);
  } else {
    let html='<div class="card"><div class="input-group"><label>選擇賽事</label><select id="signupEventSelect" class="input" onchange="onSignupEventSelect()">';
    html+='<option value="">請選擇...</option>';
    signupEvents.forEach(ev=>{
      const selected=(lastSignupEventId&&ev.id===lastSignupEventId)?' selected':'';
      html+='<option value="'+ev.id+'"'+selected+'>'+esc(ev.name)+(ev.date?'（'+esc(ev.date)+'）':'')+'</option>';
    });
    html+='</select></div></div><div id="signupForm"></div>';
    content.innerHTML=html;
    if(lastSignupEventId&&signupEvents.find(e=>e.id===lastSignupEventId)){
      await selectSignupEvent(lastSignupEventId, true);
    }
  }
}
window.onSignupEventSelect=async function(){
  const id=document.getElementById('signupEventSelect').value;
  if(!id){document.getElementById('signupForm').innerHTML='';return;}
  await selectSignupEvent(id, true);
}
async function selectSignupEvent(eventId, keepWrapper){
  curSignupEvent=signupEvents.find(e=>e.id===eventId);
  lastSignupEventId=eventId;
  curSignupCustomFields=curSignupEvent.customFields||[];
  const gSnap=await getDocs(collection(db,'events',eventId,'groups'));
  const groupDocs=gSnap.docs.map(d=>d.data());
  const groups=groupDocs.map(g=>g.name);
  // 存下組別限制資料
  window._signupGroupMap={};
  groupDocs.forEach(g=>{window._signupGroupMap[g.name]=g;});

  let formHtml='';
  // 圖片永遠顯示在最上方
  if(curSignupEvent.bannerUrl){
    formHtml+='<div style="margin-bottom:12px"><img src="'+esc(curSignupEvent.bannerUrl)+'" style="max-width:100%;border-radius:12px;display:block" onerror="this.style.display=\'none\'"></div>';
  }
  // 賽事資訊卡（單賽事時用 card，多賽事時在 signupForm 內補一個資訊區塊）
  const regInfo=buildRegInfoHtml(curSignupEvent, curSignupEvent._entryCount||0);
  const infoCardHtml='<div class="card" style="text-align:center;margin-bottom:12px"><strong>'+esc(curSignupEvent.name)+'</strong>'
    +(curSignupEvent.date?'<div style="font-size:.78rem;color:var(--muted);margin-top:4px">'+esc(curSignupEvent.date)+'</div>':'')
    +(regInfo?'<div style="margin-top:8px;text-align:left">'+regInfo+'</div>':'')
    +'</div>';
  if(!keepWrapper){
    formHtml+=infoCardHtml;
  } else {
    // 多賽事：在表單最上方插入資訊卡
    formHtml+=infoCardHtml;
  }
  formHtml+='<div class="card">';
  formHtml+='<div class="input-group"><label>組別 *</label><select id="suGroup" class="input" onchange="onSignupGroupChange()">';
  if(groups.length){
    groups.forEach(g=>{formHtml+='<option value="'+esc(g)+'">'+esc(g)+'</option>';});
  }else{
    formHtml+='<option value="未分組">未分組</option>';
  }
  formHtml+='</select>'
    +'<div id="suGroupHint" style="font-size:.75rem;margin-top:4px;min-height:16px;color:var(--muted)"></div>'
    +'</div>';
  // 邀請碼（由 onSignupGroupChange 動態顯示）
  formHtml+='<div class="input-group" id="suInviteCodeRow" style="display:none"><label>邀請碼 *</label>'
    +'<input id="suInviteCode" type="text" class="input" placeholder="請輸入邀請碼">'
    +'</div>';

  // 固定欄位的顯示/必填由 fieldSettings 決定
  const fs=curSignupEvent.fieldSettings||{};
  const phoneShow=fs.phone?.show!==false;
  const phoneReq=fs.phone?.required===true;
  const emailShow=fs.email?.show!==false;
  const emailReq=fs.email?.required===true;
  const idShow=fs.idNumber?.show!==false;
  const idReq=fs.idNumber?.required===true;

  formHtml+='<div class="input-group"><label>姓名 *</label><input id="suName" type="text" class="input" placeholder="王小明"></div>';
  formHtml+='<div class="input-group"><label>性別 *</label><select id="suGender" class="input"><option value="">請選擇...</option><option value="男">男</option><option value="女">女</option></select></div>';
  formHtml+='<div class="input-group"><label>生日（yyyy/mm/dd）*</label>';
  formHtml+='<div class="input-row"><input id="suBirthday" data-fmt="ymd" type="text" class="input" placeholder="yyyy/mm/dd" oninput="applyHalf(this);updateParentalBlock()" onblur="setFieldError(\'suBirthday\',!validateBirthday(this.value.trim()));updateParentalBlock()">';
  formHtml+='<button type="button" class="btn btn-ghost btn-sm" onclick="var _d=document.getElementById(\'suBirthdayPicker\');_d.showPicker?_d.showPicker():_d.click()">📅</button>';
  formHtml+='<input type="date" id="suBirthdayPicker" style="display:none" onchange="if(this.value){const[y,m,d]=this.value.split(\'-\');document.getElementById(\'suBirthday\').value=y+\'/\'+m+\'/\'+d;setFieldError(\'suBirthday\',false);updateParentalBlock();this.value=\'\'}"></div></div>';
  if(phoneShow) formHtml+='<div class="input-group"><label>手機號碼（09開頭10碼）'+(phoneReq?' *':'')+'</label><input id="suPhone" type="tel" class="input" placeholder="0912345678" onblur="if(this.value.trim())setFieldError(\'suPhone\',!validatePhone(this.value.trim()))"></div>';
  if(emailShow) formHtml+='<div class="input-group"><label>E-Mail'+(emailReq?' *':'')+'</label><input id="suEmail" type="email" class="input" placeholder="example@email.com" onblur="setFieldError(\'suEmail\',!validateEmail(this.value.trim()))"></div>';
  if(idShow) formHtml+='<div class="input-group"><label>身分證字號（1英文+9數字）'+(idReq?' *':'')+'</label><input id="suIdNumber" type="text" class="input" placeholder="A123456789" onblur="setFieldError(\'suIdNumber\',!validateId(this.value.trim()))"></div>';
  formHtml+='<div class="input-group"><label>備註</label><input id="suNote" type="text" class="input"></div>';
  // 允許自選號碼時才顯示號碼欄位
  if(curSignupEvent.allowCustomBib){
    const rMin=curSignupEvent.bibRangeMin||0;
    const rMax=curSignupEvent.bibRangeMax||0;
    const pad=curSignupEvent.bibPadLength||3;
    const rangeHint=(rMin>0&&rMax>0)?'號碼須在 '+rMin+'～'+rMax+' 之間，留空系統自動配號':'留空系統自動配號';
    const bibPlaceholder=(rMin>0&&rMax>0)?String(rMin).padStart(pad,'0')+'～'+String(rMax).padStart(pad,'0'):String(1).padStart(pad,'0');
    formHtml+='<div class="input-group"><label>選手號碼（選填，'+rangeHint+'）</label>'
      +'<input id="suBib" type="text" class="input" placeholder="例：'+bibPlaceholder+'" oninput="applyHalf(this)" onblur="checkBibAvailable()">'
      +'<div id="suBibHint" style="font-size:.75rem;margin-top:4px;min-height:18px"></div>'
      +'</div>';
  }

  // 自訂欄位
  curSignupCustomFields.forEach(f=>{
    const id='su_cf_'+f.id;
    const reqMark=f.required?' *':'';
    if(f.type==='select'){
      formHtml+='<div class="input-group"><label>'+esc(f.label)+reqMark+'</label><select id="'+id+'" class="input"><option value="">請選擇...</option>';
      (f.options||[]).forEach(o=>{formHtml+='<option value="'+esc(o)+'">'+esc(o)+'</option>';});
      formHtml+='</select></div>';
    } else if(f.type==='checkbox'){
      formHtml+='<div class="input-group"><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="'+id+'"> '+esc(f.label)+'</label></div>';
    } else {
      formHtml+='<div class="input-group"><label>'+esc(f.label)+reqMark+'</label><input id="'+id+'" type="text" class="input"></div>';
    }
  });

  // 家長陪同聲明（由 onSignupGroupChange 動態顯示）
  formHtml+='<div id="suParentalBlock" style="display:none">'
    +'<div style="padding:12px;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.3);border-radius:8px;margin-bottom:14px">'
    +'<label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:.85rem;line-height:1.5">'
    +'<input type="checkbox" id="suParentalConsent" style="margin-top:3px;flex-shrink:0">'
    +'<span>本人（家長／監護人）已閱讀相關規定，同意全程陪同參賽者完成賽事，並承擔相關責任。</span>'
    +'</label>'
    +'<div class="input-group" style="margin-top:10px;margin-bottom:0">'
    +'<label>緊急聯絡人姓名 *</label><input id="suParentName" type="text" class="input" placeholder="家長／監護人姓名">'
    +'</div>'
    +'<div class="input-group" style="margin-top:10px;margin-bottom:0">'
    +'<label>緊急聯絡人手機 *</label><input id="suParentPhone" type="tel" class="input" placeholder="0912345678" oninput="applyHalf(this)">'
    +'</div>'
    +'</div>'
    +'</div>';
  formHtml+='<button class="btn btn-primary btn-full" onclick="submitSignup()">送出報名</button>';
  formHtml+='</div>';

  if(keepWrapper){
    document.getElementById('signupForm').innerHTML=formHtml;
  }else{
    document.getElementById('signupContent').innerHTML=formHtml;
  }
}

// ── 組別切換時動態顯示限制欄位 ──
window.onSignupGroupChange=function(){
  const group=document.getElementById('suGroup')?.value;
  const g=window._signupGroupMap?.[group];
  const inviteRow=document.getElementById('suInviteCodeRow');
  const parentalBlock=document.getElementById('suParentalBlock');
  const hint=document.getElementById('suGroupHint');
  if(inviteRow){inviteRow.style.display='none';document.getElementById('suInviteCode').value='';}
  if(parentalBlock)parentalBlock.style.display='none';
  if(!g||!hint)return;
  // 限制摘要
  const hints=[];
  if(g.genderLimit)hints.push('限'+g.genderLimit+'性');
  if(g.ageMin>0)hints.push(g.ageMin+'歲以上');
  if(g.ageMax>0)hints.push(g.ageMax+'歲以下');
  if(g.groupCapacity>0)hints.push('限'+g.groupCapacity+'人');
  if(g.parentalAge>0)hints.push(g.parentalAge+'歲以下須家長陪同聲明');
  hint.textContent=hints.length?'此組別限制：'+hints.join('、'):'';
  // 邀請碼
  if(inviteRow&&g.inviteCode?.trim())inviteRow.style.display='';
  // 家長陪同：有生日才判斷，否則隱藏等待填生日
  const birthday=document.getElementById('suBirthday')?.value.trim();
  if(birthday&&validateBirthday(birthday)){
    updateParentalBlock();
  }else{
    if(parentalBlock)parentalBlock.style.display='none';
  }
}

// 依目前填寫的生日判斷是否需要顯示家長聲明區塊
window.updateParentalBlock=function updateParentalBlock(){
  const group=document.getElementById('suGroup')?.value;
  const g=window._signupGroupMap?.[group];
  const block=document.getElementById('suParentalBlock');
  if(!block)return;
  if(!g||!(g.parentalAge>0)){block.style.display='none';return;}
  const birthday=document.getElementById('suBirthday')?.value.trim();
  if(birthday&&validateBirthday(birthday)){
    const evDate=curSignupEvent?.date||new Date().getFullYear()+'-01-01';
    const age=calcAgeRunner(birthday,evDate);
    if(age!==null&&age>=g.parentalAge){block.style.display='none';return;}
    block.style.display='';
  }else{
    block.style.display='none';
  }
}

window.calcAgeRunner=function calcAgeRunner(birthday,eventDate){
  if(!birthday||!eventDate)return null;
  const [by,bm,bd]=birthday.split('/').map(Number);
  const [ey,em,ed]=eventDate.split('-').map(Number);
  if(!by||!ey)return null;
  let age=ey-by;
  if(em<bm||(em===bm&&ed<bd))age--;
  return age;
}

// ── 即時號碼重複檢查（自選號碼用）──
window.checkBibAvailable=async function(){
  const el=document.getElementById('suBib');
  const hint=document.getElementById('suBibHint');
  if(!el||!hint)return;
  const bib=el.value.trim();
  if(!bib){hint.textContent='';el.style.borderColor='';return;}
  const n=parseInt(bib);
  if(isNaN(n)||String(n)!==bib.replace(/^0+/,'')||n<1){
    el.style.borderColor='var(--red)';
    hint.innerHTML='<span style="color:var(--red)">❌ 請輸入正整數</span>';
    return;
  }
  // 範圍檢查
  if(curSignupEvent){
    const rMin=curSignupEvent.bibRangeMin||0;
    const rMax=curSignupEvent.bibRangeMax||0;
    if(rMin>0&&rMax>0&&(n<rMin||n>rMax)){
      el.style.borderColor='var(--red)';
      hint.innerHTML='<span style="color:var(--red)">❌ 號碼須在 '+rMin+'～'+rMax+' 之間</span>';
      return;
    }
  }
  if(!curSignupEvent){return;}
  const snap=await getDocs(collection(db,'events',curSignupEvent.id,'runners'));
  const pad=curSignupEvent.bibPadLength||3;
  const padded=String(n).padStart(pad,'0');
  const dup=snap.docs.some(d=>d.data().bibNumber===padded);
  if(dup){
    el.style.borderColor='var(--red)';
    hint.innerHTML='<span style="color:var(--red)">❌ 此號碼已被使用，請換一個</span>';
  }else{
    el.style.borderColor='var(--green)';
    hint.innerHTML='<span style="color:var(--green)">✅ 號碼 '+padded+' 可使用</span>';
  }
}

window.submitSignup=async function(){
  const eventId=curSignupEvent.id;
  const group=document.getElementById('suGroup').value;
  const name=document.getElementById('suName').value.trim();
  const gender=document.getElementById('suGender').value;
  const birthday=document.getElementById('suBirthday').value.trim();
  const fs=curSignupEvent.fieldSettings||{};
  const phone=(fs.phone?.show!==false)?document.getElementById('suPhone')?.value.trim()||''  :'';
  const email=(fs.email?.show!==false)?document.getElementById('suEmail')?.value.trim()||''  :'';
  const idNumber=(fs.idNumber?.show!==false)?document.getElementById('suIdNumber')?.value.trim()||'':'';
  const note=document.getElementById('suNote').value.trim();

  if(!name){showToast('請填寫姓名','error');return;}
  if(!gender){showToast('請選擇性別','error');return;}
  if(!birthday){setFieldError('suBirthday',true);showToast('請填寫生日','error');return;}
  if(!/^\d{4}\/\d{2}\/\d{2}$/.test(birthday)){setFieldError('suBirthday',true);showToast('生日格式錯誤（yyyy/mm/dd）','error');return;}
  {
    const [by,bm,bd]=birthday.split('/').map(Number);
    const dt=new Date(by,bm-1,bd);
    const today=new Date();today.setHours(0,0,0,0);
    if(dt.getFullYear()!==by||dt.getMonth()!==bm-1||dt.getDate()!==bd){setFieldError('suBirthday',true);showToast('生日日期不存在','error');return;}
    if(dt>=today){setFieldError('suBirthday',true);showToast('生日不能是今天或未來日期','error');return;}
    if(by<1900){setFieldError('suBirthday',true);showToast('生日年份不合理','error');return;}
  }
  if(fs.phone?.show!==false){
    if(fs.phone?.required&&!phone){setFieldError('suPhone',true);showToast('請填寫手機號碼','error');return;}
    if(phone&&!validatePhone(phone)){setFieldError('suPhone',true);showToast('手機號碼格式錯誤（09開頭10碼）','error');return;}
  }
  if(fs.email?.show!==false){
    if(fs.email?.required&&!email){setFieldError('suEmail',true);showToast('請填寫 E-Mail','error');return;}
    if(!validateEmail(email)){setFieldError('suEmail',true);showToast('請填寫正確的Email格式','error');return;}
  }
  if(fs.idNumber?.show!==false){
    if(fs.idNumber?.required&&!idNumber){setFieldError('suIdNumber',true);showToast('請填寫身分證字號','error');return;}
    if(!validateId(idNumber)){setFieldError('suIdNumber',true);showToast('請填寫正確的身分證字號格式','error');return;}
  }

  // 組別限制驗證
  const inviteInput=document.getElementById('suInviteCode')?.value.trim()||'';
  const g=window._signupGroupMap?.[group];
  if(g){
    const evDate=curSignupEvent?.date||'';
    if(g.genderLimit&&gender&&g.genderLimit!==gender){showToast('此組別限'+g.genderLimit+'性報名','error');return;}
    if(birthday&&evDate){
      const age=calcAgeRunner(birthday,evDate);
      if(age!==null){
        if(g.ageMin>0&&age<g.ageMin){showToast('此組別年齡限制 '+g.ageMin+' 歲以上（您的年齡：'+age+'歲）','error');return;}
        if(g.ageMax>0&&age>g.ageMax){showToast('此組別年齡限制 '+g.ageMax+' 歲以下（您的年齡：'+age+'歲）','error');return;}
      }
    }
    if(g.inviteCode?.trim()&&inviteInput!==g.inviteCode.trim()){showToast('邀請碼不正確','error');return;}
    // 家長陪同聲明：只要 block 顯示中就驗證，不依賴 evDate
    if(g.parentalAge>0){
      const parentalBlock=document.getElementById('suParentalBlock');
      if(parentalBlock&&parentalBlock.style.display!=='none'){
        const consent=document.getElementById('suParentalConsent');
        const parentName=document.getElementById('suParentName')?.value.trim()||'';
        const parentPhone=document.getElementById('suParentPhone')?.value.trim()||'';
        if(!consent?.checked){showToast('請勾選家長陪同聲明','error');return;}
        if(!parentName){showToast('請填寫緊急聯絡人姓名','error');return;}
        if(!parentPhone||!validatePhone(parentPhone)){showToast('請填寫正確的緊急聯絡人手機','error');return;}
      }
    }
    // 組別名額
    if(g.groupCapacity>0){
      const capSnap=await getDocs(query(collection(db,'events',curSignupEvent.id,'runners'),where('group','==',group)));
      if(capSnap.size>=g.groupCapacity){showToast('此組別已額滿（'+g.groupCapacity+'人）','error');return;}
    }
  }

  // 自訂欄位必填驗證 + 收集
  const customData={};
  for(const f of curSignupCustomFields){
    const el=document.getElementById('su_cf_'+f.id);
    if(!el)continue;
    if(f.type==='checkbox'){customData[f.id]=el.checked;}
    else{
      const v=el.value.trim();
      if(f.required&&!v){showToast('「'+f.label+'」為必填','error');return;}
      customData[f.id]=v;
    }
  }

  const runnerData={name,gender,birthday,phone,email,idNumber,note};

  // 收集家長陪同資料（如有）
  const parentalConsentAgreed=document.getElementById('suParentalConsent')?.checked||false;
  const parentName=document.getElementById('suParentName')?.value.trim()||'';
  const parentPhone=document.getElementById('suParentPhone')?.value.trim()||'';
  const parentalData=parentalConsentAgreed?{parentalConsentAgreed,parentName,parentPhone}:{};

  // 自選號碼（若開放且有填）
  const customBibEl=document.getElementById('suBib');
  const customBibRaw=customBibEl?customBibEl.value.trim():'';
  let customBib='';
  if(customBibRaw){
    const n=parseInt(customBibRaw);
    if(isNaN(n)||n<1){showToast('號碼請輸入正整數','error');return;}
    const rMin=curSignupEvent.bibRangeMin||0;
    const rMax=curSignupEvent.bibRangeMax||0;
    if(rMin>0&&rMax>0&&(n<rMin||n>rMax)){
      showToast('號碼須在 '+rMin+'～'+rMax+' 之間','error');
      if(customBibEl)customBibEl.style.borderColor='var(--red)';
      return;
    }
    const pad=curSignupEvent.bibPadLength||3;
    customBib=String(n).padStart(pad,'0');
  }
  // 若填了號碼，先做最終重複確認
  if(customBib){
    const dupSnap=await getDocs(collection(db,'events',curSignupEvent.id,'runners'));
    if(dupSnap.docs.some(d=>d.data().bibNumber===customBib)){
      showToast('號碼 '+customBib+' 已被使用，請重新填寫','error');
      if(customBibEl){customBibEl.style.borderColor='var(--red)';}
      return;
    }
  }

  const btn=document.querySelector('#signupContent .btn-primary, #signupForm .btn-primary');
  btn.textContent='送出中...'; btn.disabled=true;
  try{
    // 比對現有選手
    const runnerSnap=await getDocs(collection(db,'runners'));
    const existingRunners=runnerSnap.docs.map(d=>({docId:d.id,...d.data()}));
    const match=existingRunners.find(r=>isSamePerson(r,runnerData));

    // 有比對到，資料有差異時才跳出確認對話框
    if(match){
      const fields=[
        {label:'姓名',old:match.name||'',new:name},
        {label:'性別',old:match.gender||'',new:gender},
        {label:'生日',old:match.birthday||'',new:birthday},
        {label:'手機',old:match.phone||'',new:phone},
        {label:'Email',old:match.email||'',new:email},
        {label:'身分證',old:match.idNumber||'',new:idNumber},
      ];
      const hasDiff=fields.some(f=>f.old!==f.new);
      if(hasDiff){
        btn.textContent='送出報名'; btn.disabled=false;
        const dialog=document.createElement('div');
        dialog.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9998;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box';
        let rows=fields.map(f=>{
          const oldVal=(f.old||'').trim();
          const curVal=(f.new||'').trim();
          const diff=oldVal!==curVal;
          let dbCell, rowStyle='';
          if(!diff){
            rowStyle='color:var(--green)';
            dbCell=esc(oldVal||'');
          } else if(!oldVal){
            rowStyle='';
            dbCell='';
          } else {
            rowStyle='color:var(--accent)';
            dbCell='<span style="font-size:.75rem;padding:2px 6px;background:rgba(249,115,22,.12);border-radius:4px;border:1px solid rgba(249,115,22,.3)">有差異</span>';
          }
          return '<tr style="'+rowStyle+'">'
            +'<td style="padding:4px 8px;font-size:.78rem;color:var(--muted);white-space:nowrap;border:none">'+esc(f.label)+'</td>'
            +'<td style="padding:4px 8px;font-size:.85rem;word-break:break-all;border:none">'+dbCell+'</td>'
            +'<td style="padding:4px 8px;font-size:.85rem;word-break:break-all;border:none">'+esc(curVal||'')+'</td>'
            +'</tr>';
        }).join('');
        const diffEmptyFields=fields.filter(f=>(f.old||'').trim()&&!(f.new||'').trim()).map(f=>f.label);
        const hintHtml=diffEmptyFields.length
          ?'<div style="font-size:.75rem;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.25);border-radius:8px;padding:8px 12px;margin-bottom:12px;line-height:1.6">'
            +'💡 建議補填 <strong>'+esc(diffEmptyFields.join('、'))+'</strong>，有助於進一步確認是否為同一人。'
            +'<br><span style="color:var(--muted)">可點「重填」回到表單補充資料。</span>'
            +'</div>'
          :'';
        dialog.innerHTML='<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;max-width:480px;width:100%;box-sizing:border-box;overflow:hidden">'
          +'<div style="font-size:1rem;font-weight:700;margin-bottom:4px">找到相似的資料</div>'
          +'<div style="font-size:.78rem;color:var(--muted);margin-bottom:12px">綠色為相符欄位；橘色欄位有差異，請確認是否為同一人。</div>'
          +'<table style="width:100%;border-collapse:collapse;table-layout:fixed;margin-bottom:14px">'
          +'<colgroup><col style="width:52px"><col><col></colgroup>'
          +'<thead><tr>'
          +'<th style="padding:4px 8px;font-size:.72rem;color:var(--muted);text-align:left;border:none"></th>'
          +'<th style="padding:4px 8px;font-size:.72rem;color:var(--muted);text-align:left;border:none">資料庫</th>'
          +'<th style="padding:4px 8px;font-size:.72rem;color:var(--muted);text-align:left;border:none">您填寫的</th>'
          +'</tr></thead>'
          +'<tbody>'+rows+'</tbody></table>'
          +hintHtml
          +'<div style="font-size:.75rem;color:var(--accent);margin-bottom:12px">⚠️ 若選「同一人」，則以新資料取代舊資料！</div>'
          +'<div style="display:flex;gap:8px;flex-wrap:wrap">'
          +'<button id="dlgSame" class="btn btn-primary btn-sm">✅ 同一人</button>'
          +'<button id="dlgNew" class="btn btn-ghost btn-sm">👤 非同一人</button>'
          +'<button id="dlgRefill" class="btn btn-ghost btn-sm">✏️ 重填</button>'
          +'</div></div>';
        document.body.appendChild(dialog);
        const result=await new Promise(resolve=>{
          dialog.querySelector('#dlgSame').onclick=()=>{dialog.remove();resolve('same');};
          dialog.querySelector('#dlgNew').onclick=()=>{dialog.remove();resolve('new');};
          dialog.querySelector('#dlgRefill').onclick=()=>{dialog.remove();resolve('refill');};
        });
        if(result==='refill') return;
        if(result==='new'){
          await doSignup(eventId,group,name,gender,birthday,phone,email,idNumber,note,customData,runnerData,existingRunners,null,customBib,parentalData);
          return;
        }
        await doSignup(eventId,group,name,gender,birthday,phone,email,idNumber,note,customData,runnerData,existingRunners,match,customBib,parentalData);
        return;
      }
      // 完全相同，直接沿用
      await doSignup(eventId,group,name,gender,birthday,phone,email,idNumber,note,customData,runnerData,existingRunners,match,customBib,parentalData);
      return;
    }
    await doSignup(eventId,group,name,gender,birthday,phone,email,idNumber,note,customData,runnerData,existingRunners,null,customBib,parentalData);
  }catch(e){
    showToast('報名失敗：'+e.message,'error');
    const b=document.querySelector('#signupContent .btn-primary, #signupForm .btn-primary');
    if(b){b.textContent='送出報名';b.disabled=false;}
  }
}

async function doSignup(eventId,group,name,gender,birthday,phone,email,idNumber,note,customData,runnerData,existingRunners,match,customBib,parentalData){
  const btn=document.querySelector('#signupContent .btn-primary, #signupForm .btn-primary');
  if(btn){btn.textContent='送出中...';btn.disabled=true;}
  try{
    let uniqueId;
    const batch=writeBatch(db);
    if(match){
      uniqueId=match.uniqueId;
      if(!match.docId){showToast('選手資料異常，請聯絡管理員','error');if(btn){btn.textContent='送出報名';btn.disabled=false;}return;}
      // 檢查是否已報名此賽事
      const entrySnap=await getDocs(query(collection(db,'events',eventId,'runners'),where('uniqueId','==',uniqueId)));
      if(!entrySnap.empty){
        const existingEntry=entrySnap.docs[0];
        const existingData=existingEntry.data();
        // 已報名：更新選手資料、group 及 customData
        await updateDoc(doc(db,'runners',match.docId),{...runnerData,updatedAt:serverTimestamp()});
        if(existingData.cancelRequested){
          // 之前申請取消但尚未經審核，視為撤回申請、重新啟用此筆報名
          await updateDoc(doc(db,'events',eventId,'runners',existingEntry.id),{
            group,customData,updatedAt:serverTimestamp(),
            cancelRequested:deleteField(),cancelRequestedAt:deleteField()
          });
          showToast('已為您重新啟用此賽事的報名（取消申請已自動撤回）');
        } else {
          await updateDoc(doc(db,'events',eventId,'runners',existingEntry.id),{group,customData,updatedAt:serverTimestamp()});
          showToast('選手資料已更新，您已報名過此賽事');
        }
        if(btn){btn.textContent='送出報名';btn.disabled=false;}
        return;
      }
      // 未報名：更新選手資料並新增報名記錄
      batch.update(doc(db,'runners',match.docId),{...runnerData,updatedAt:serverTimestamp()});
    } else {
      let maxId=0;
      existingRunners.forEach(r=>{const n=parseInt((r.uniqueId||'').replace('R',''))||0;if(n>maxId)maxId=n;});
      uniqueId='R'+String(maxId+1).padStart(4,'0');
      batch.set(doc(collection(db,'runners')),{...runnerData,uniqueId,createdAt:serverTimestamp(),updatedAt:serverTimestamp()});
    }
    // 分配編號：有自選號碼優先用，否則系統自動配（先在範圍內找，範圍滿後往外配）
    const entryAllSnap=await getDocs(collection(db,'events',eventId,'runners'));
    const usedBibs=new Set(entryAllSnap.docs.map(d=>d.data().bibNumber));
    let bibNumber;
    if(customBib){
      if(usedBibs.has(customBib)){showToast('號碼 '+customBib+' 剛被別人用走了，已自動配號','error');}
      else{bibNumber=customBib;}
    }
    if(!bibNumber){
      const pad=curSignupEvent?.bibPadLength||3;
      const rMin=curSignupEvent?.bibRangeMin||0;
      const rMax=curSignupEvent?.bibRangeMax||0;
      const hasRange=rMin>0&&rMax>0;
      let n;
      if(hasRange){
        let found=false;
        for(let i=rMin;i<=rMax;i++){
          if(!usedBibs.has(String(i).padStart(pad,'0'))){n=i;found=true;break;}
        }
        if(!found)n=rMax+1;
      }else{
        n=1;
      }
      while(usedBibs.has(String(n).padStart(pad,'0')))n++;
      bibNumber=String(n).padStart(pad,'0');
    }
    batch.set(doc(collection(db,'events',eventId,'runners')),{uniqueId,bibNumber,group,customData,...parentalData,createdAt:serverTimestamp(),updatedAt:serverTimestamp()});
    await batch.commit();
    showSignupSuccess({uniqueId,name,gender,group,bibNumber,eventName:curSignupEvent.name,eventDate:curSignupEvent.date});
  }catch(e){
    showToast('報名失敗：'+e.message,'error');
    if(btn){btn.textContent='送出報名';btn.disabled=false;}
  }
}

window.checkEditBibAvailable=async function(eventId, entryDocId, cardId){
  const el=document.getElementById(cardId+'_eBib');
  const hint=document.getElementById(cardId+'_eBibHint');
  if(!el||!hint)return;
  const bib=el.value.trim();
  if(!bib){hint.textContent='';el.style.borderColor='';return;}
  const n=parseInt(bib);
  if(isNaN(n)||n<1){
    el.style.borderColor='var(--red)';
    hint.innerHTML='<span style="color:var(--red)">❌ 請輸入正整數</span>';
    return;
  }
  // 範圍檢查（從 hidden input 讀取）
  const rangeEl=document.getElementById(cardId+'_bibRange');
  const rMin=rangeEl?parseInt(rangeEl.dataset.min)||0:0;
  const rMax=rangeEl?parseInt(rangeEl.dataset.max)||0:0;
  const pad=rangeEl?parseInt(rangeEl.dataset.pad)||3:3;
  if(rMin>0&&rMax>0&&(n<rMin||n>rMax)){
    el.style.borderColor='var(--red)';
    hint.innerHTML='<span style="color:var(--red)">❌ 號碼須在 '+rMin+'～'+rMax+' 之間</span>';
    return;
  }
  const padded=String(n).padStart(pad,'0');
  const snap=await getDocs(collection(db,'events',eventId,'runners'));
  const dup=snap.docs.some(d=>d.id!==entryDocId&&d.data().bibNumber===padded);
  if(dup){
    el.style.borderColor='var(--red)';
    hint.innerHTML='<span style="color:var(--red)">❌ 此號碼已被使用</span>';
  }else{
    el.style.borderColor='var(--green)';
    hint.innerHTML='<span style="color:var(--green)">✅ 號碼 '+padded+' 可使用</span>';
  }
}

  html+='<div class="input-group"><label>組別</label><select id="'+cardId+'_eGroup" class="input" onchange="updateEditParentalBlock(\''+cardId+'\',\''+gMapEsc+'\',\''+evDateEsc+'\')">';
  groups.forEach(g=>{html+='<option value="'+esc(g)+'"'+(g===e.group?' selected':'')+'>'+esc(g)+'</option>';});
  html+='</select></div>';
  // 家長陪同欄位
  html+='<div id="'+cardId+'_eParentalBlock" style="display:'+(showParental?'':'none')+'">'
    +'<div style="padding:12px;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.3);border-radius:8px;margin-bottom:14px">'
    +'<label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:.85rem;line-height:1.5">'
    +'<input type="checkbox" id="'+cardId+'_eParentalConsent" style="margin-top:3px;flex-shrink:0"'+(e.parentalConsentAgreed?' checked':'')+'>'
    +'<span>本人（家長／監護人）已閱讀相關規定，同意全程陪同參賽者完成賽事，並承擔相關責任。</span>'
    +'</label>'
    +'<div class="input-group" style="margin-top:10px;margin-bottom:0">'
    +'<label>緊急聯絡人姓名 *</label><input id="'+cardId+'_eParentName" type="text" class="input" value="'+esc(e.parentName||'')+'" placeholder="家長／監護人姓名">'
    +'</div>'
    +'<div class="input-group" style="margin-top:10px;margin-bottom:0">'
    +'<label>緊急聯絡人手機 *</label><input id="'+cardId+'_eParentPhone" type="tel" class="input" value="'+esc(e.parentPhone||'')+'" placeholder="0912345678" oninput="applyHalf(this)">'
    +'</div>'
    +'</div>'
    +'</div>';
  customFields.forEach(f=>{
    const fid=cardId+'_ecf_'+f.id;
    if(f.type==='select'){
      html+='<div class="input-group"><label>'+esc(f.label)+'</label><select id="'+fid+'" class="input"><option value="">請選擇...</option>';
      (f.options||[]).forEach(o=>{html+='<option value="'+esc(o)+'"'+(customData[f.id]===o?' selected':'')+'>'+esc(o)+'</option>';});
      html+='</select></div>';
    }else if(f.type==='checkbox'){
      html+='<div class="input-group"><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="'+fid+'" '+(customData[f.id]?'checked':'')+'> '+esc(f.label)+'</label></div>';
    }else{
      html+='<div class="input-group"><label>'+esc(f.label)+'</label><input id="'+fid+'" type="text" class="input" value="'+esc(customData[f.id]!==undefined?customData[f.id]:'')+'"></div>';
    }
  });
  html+='<button class="btn btn-primary btn-full" onclick="saveEditEntry(\''+eventId+'\',\''+entryDocId+'\',\''+(rDocRef?rDocRef.id:'')+'\',\''+cardId+'\')">儲存修改</button>';
  html+='</div>';
  box.innerHTML=html;
  box.dataset.customFields=JSON.stringify(customFields);
}

// 修改表單：依生日/組別更新家長陪同區塊顯示
window.updateEditParentalBlock=function(cardId, gMapJson, evDate){
  const block=document.getElementById(cardId+'_eParentalBlock');
  if(!block)return;
  try{
    const gMap=JSON.parse(gMapJson);
    const group=document.getElementById(cardId+'_eGroup')?.value;
    const birthday=document.getElementById(cardId+'_eBirthday')?.value.trim();
    const g=gMap[group];
    if(!g||!(g.parentalAge>0)){block.style.display='none';return;}
    // 組別有家長陪同設定：預設顯示
    // 只有生日格式正確且年齡明確超過限制時才隱藏
    if(birthday&&validateBirthday(birthday)){
      const base=evDate||new Date().getFullYear()+'-01-01';
      const age=calcAgeRunner(birthday,base);
      if(age!==null&&age>=g.parentalAge){block.style.display='none';return;}
      block.style.display='';
    }else{
      block.style.display='none';
    }
  }catch(e){block.style.display='none';}
}

window.saveEditEntry=async function(eventId,entryDocId,runnerDocId,cardId){
  const name=document.getElementById(cardId+'_eName').value.trim();
  const gender=document.getElementById(cardId+'_eGender').value;
  const birthday=document.getElementById(cardId+'_eBirthday').value.trim();
  const phone=document.getElementById(cardId+'_ePhone').value.trim();
  const email=document.getElementById(cardId+'_eEmail').value.trim();
  const idNumber=document.getElementById(cardId+'_eIdNumber').value.trim();
  const note=document.getElementById(cardId+'_eNote').value.trim();
  const group=document.getElementById(cardId+'_eGroup').value;
  const bibEl=document.getElementById(cardId+'_eBib');
  const rangeEl=document.getElementById(cardId+'_bibRange');
  const newBibRaw=bibEl?bibEl.value.trim():'';
  let newBib='';
  if(newBibRaw){
    const n=parseInt(newBibRaw);
    if(isNaN(n)||n<1){showToast('號碼請輸入正整數','error');return;}
    const rMin=rangeEl?parseInt(rangeEl.dataset.min)||0:0;
    const rMax=rangeEl?parseInt(rangeEl.dataset.max)||0:0;
    const pad=rangeEl?parseInt(rangeEl.dataset.pad)||3:3;
    if(rMin>0&&rMax>0&&(n<rMin||n>rMax)){
      showToast('號碼須在 '+rMin+'～'+rMax+' 之間','error');
      if(bibEl)bibEl.style.borderColor='var(--red)';
      return;
    }
    newBib=String(n).padStart(pad,'0');
  }
  if(!name){showToast('姓名為必填','error');return;}
  if(birthday&&!validateBirthday(birthday)){showToast('生日格式錯誤或不合理（不能是未來日期）','error');return;}
  if(phone&&!validatePhone(phone)){showToast('手機號碼格式錯誤','error');return;}
  if(email&&!validateEmail(email)){showToast('Email格式錯誤','error');return;}
  if(idNumber&&!validateId(idNumber)){showToast('身分證格式錯誤','error');return;}
  // 若有填新號碼，最終重複確認
  if(newBib){
    const dupSnap=await getDocs(collection(db,'events',eventId,'runners'));
    if(dupSnap.docs.some(d=>d.id!==entryDocId&&d.data().bibNumber===newBib)){
      showToast('號碼 '+newBib+' 已被使用，請重新填寫','error');
      if(bibEl)bibEl.style.borderColor='var(--red)';
      return;
    }
  }
  const customFields=JSON.parse(document.getElementById(cardId+'_edit').dataset.customFields||'[]');
  const customData={};
  for(const f of customFields){
    const el=document.getElementById(cardId+'_ecf_'+f.id); if(!el)continue;
    if(f.type==='checkbox')customData[f.id]=el.checked;
    else{if(f.required&&!el.value.trim()){showToast('「'+f.label+'」為必填','error');return;}customData[f.id]=el.value.trim();}
  }
  // 家長陪同欄位（若 block 顯示中才驗證和儲存）
  const parentalBlock=document.getElementById(cardId+'_eParentalBlock');
  const parentalVisible=parentalBlock&&parentalBlock.style.display!=='none';
  let parentalData={};
  if(parentalVisible){
    const consent=document.getElementById(cardId+'_eParentalConsent')?.checked||false;
    const parentName=document.getElementById(cardId+'_eParentName')?.value.trim()||'';
    const parentPhone=document.getElementById(cardId+'_eParentPhone')?.value.trim()||'';
    if(!consent){showToast('請勾選家長陪同聲明','error');return;}
    if(!parentName){showToast('請填寫緊急聯絡人姓名','error');return;}
    if(!parentPhone||!validatePhone(parentPhone)){showToast('請填寫正確的緊急聯絡人手機','error');return;}
    parentalData={parentalConsentAgreed:true,parentName,parentPhone};
  }
  try{
    if(runnerDocId){
      await updateDoc(doc(db,'runners',runnerDocId),{name,gender,birthday,phone,email,idNumber,note,updatedAt:serverTimestamp()});
    }
    const entryUpdate={group,customData,...parentalData,updatedAt:serverTimestamp()};
    if(newBib)entryUpdate.bibNumber=newBib;
    await updateDoc(doc(db,'events',eventId,'runners',entryDocId),entryUpdate);
    showToast('已儲存修改');
    document.getElementById(cardId+'_edit').innerHTML='<div class="csv-hint">✅ 修改已儲存</div>';
  }catch(err){
    showToast('儲存失敗：'+err.message,'error');
  }
}

let lookupInited=false;
async function initLookupPage(){
  if(lookupInited)return; lookupInited=true;
  const cfg=await getDoc(doc(db,'config','active'));
  const activeId=cfg.exists()?cfg.data().eventId:null;
  const select=document.getElementById('lookupEventSelect');
  const snap=await getDocs(query(collection(db,'events'),orderBy('createdAt','desc')));
  select.innerHTML='<option value="">請選擇賽事...</option>';
  snap.docs.forEach(d=>{
    const ev=d.data(); const o=document.createElement('option');
    o.value=d.id; o.textContent=ev.name+(ev.date?' ('+ev.date+')':'');
    select.appendChild(o);
  });
  if(activeId)select.value=activeId;
}
window.onLookupAllEventsChange=function(){
  const isAll=document.getElementById('lookupAllEvents').checked;
  document.getElementById('lookupEventRow').style.display=isAll?'none':'block';
}
window.doLookup=async function(){
  const isAll=document.getElementById('lookupAllEvents').checked;
  const eventId=document.getElementById('lookupEventSelect').value;
  const uid=document.getElementById('lookupId').value.trim();
  const idNum=document.getElementById('lookupIdNum').value.trim();
  const birthday=document.getElementById('lookupBirthday').value.trim();
  const result=document.getElementById('lookupResult');
  if(!birthday){showToast('請填寫生日','error');return;}
  if(!validateBirthday(birthday)){showToast('生日格式錯誤（yyyy/mm/dd）','error');return;}
  if(!uid&&!idNum){showToast('請輸入 ID 或身分證字號（擇一）','error');return;}
  if(!isAll&&!eventId){showToast('請先選擇賽事','error');return;}
  result.innerHTML='<div class="card"><div class="loading-cell">查詢中...</div></div>';

  // 只查詢符合 ID 或身分證的候選選手，取代整個runners集合全表掃描
  // uniqueId固定為系統產生的大寫格式，统一轉大寫查詢；身分證字母可能存成大寫或小寫，兩種都查以維持原本大小寫不敏感的比對行為
  const candidateQueries=[];
  if(uid) candidateQueries.push(getDocs(query(collection(db,'runners'),where('uniqueId','==',uid.toUpperCase()))));
  if(idNum){
    candidateQueries.push(getDocs(query(collection(db,'runners'),where('idNumber','==',idNum.toUpperCase()))));
    candidateQueries.push(getDocs(query(collection(db,'runners'),where('idNumber','==',idNum.toLowerCase()))));
  }
  const candidateSnaps=await Promise.all(candidateQueries);
  const rMap={};
  candidateSnaps.forEach(snap=>snap.docs.forEach(d=>{ const r=d.data(); if(r.uniqueId) rMap[r.uniqueId]=r; }));

  function matchEntry(e){
    const r=rMap[e.uniqueId]||{};
    // 生日必須符合
    if((r.birthday||'')!==birthday) return false;
    // ID 或身分證擇一，兩個都填時任一符合即可
    const uidMatch=uid&&(e.uniqueId||'').toLowerCase()===uid.toLowerCase();
    const idNumMatch=idNum&&(r.idNumber||'').toLowerCase()===idNum.toLowerCase();
    if(uid&&idNum) return uidMatch||idNumMatch;
    if(uid) return uidMatch;
    if(idNum) return idNumMatch;
    return false;
  }

  if(!isAll){
    const entrySnap=await getDocs(collection(db,'events',eventId,'runners'));
    const entries=entrySnap.docs.map(d=>({id:d.id,...d.data()}));
    const matched=entries.filter(matchEntry);
    if(!matched.length){result.innerHTML='<div class="card"><div class="loading-cell" style="color:var(--red)">查無資料，請確認填寫的資料是否正確</div></div>';return;}
    if(matched.length>1){result.innerHTML='<div class="card"><div class="loading-cell" style="color:var(--accent)">找到多筆符合資料，請同時輸入 ID 和身分證字號</div></div>';return;}
    result.innerHTML=await buildLookupCard(matched[0], eventId, rMap, null);
  } else {
    const evSnap=await getDocs(query(collection(db,'events'),orderBy('date','desc')));
    let html='';
    for(const evDoc of evSnap.docs){
      const ev=evDoc.data();
      const entrySnap=await getDocs(collection(db,'events',evDoc.id,'runners'));
      const entries=entrySnap.docs.map(d=>({id:d.id,...d.data()}));
      const matched=entries.filter(matchEntry);
      if(!matched.length)continue;
      if(matched.length>1){
        html+='<div class="card"><div style="font-size:.85rem;color:var(--muted)">'+esc(ev.name)+'（'+esc(ev.date||'日期不詳')+'）</div><div style="color:var(--accent);font-size:.85rem;margin-top:4px">找到多筆符合資料，請同時輸入 ID 和身分證字號</div></div>';
        continue;
      }
      html+=await buildLookupCard(matched[0], evDoc.id, rMap, ev);
    }
    if(!html){result.innerHTML='<div class="card"><div class="loading-cell" style="color:var(--red)">查無資料，請確認填寫的資料是否正確</div></div>';return;}
    result.innerHTML=html;
  }
}
async function buildLookupCard(e, eventId, rMap, evData){
  const r=rMap[e.uniqueId]||{};
  const recSnap=await getDocs(query(collection(db,'events',eventId,'records'),orderBy('scanTime','asc')));
  const allRecs=recSnap.docs.map(d=>d.data()).filter(x=>x.uniqueId===e.uniqueId);
  const gSnap=await getDocs(collection(db,'events',eventId,'groups'));
  const groupStations={};
  gSnap.docs.forEach(d=>{groupStations[d.data().name]=d.data().stations||[];});
  const stations=groupStations[e.group]||[];

  const evTitle=evData?'<div style="font-size:.75rem;color:var(--muted);margin-bottom:8px">'+esc(evData.name)+(evData.date?' ・ '+esc(evData.date):'')+'</div>':'';

  let html='<div class="card">'+evTitle
    +'<div class="runner-card-header">'
    +'<strong style="font-size:1.05rem">'+esc(e.name||r.name||'')+'</strong>'
    +'<span class="badge">'+esc(e.group||'-')+'</span>'
    +'<span class="badge">編號 '+esc(e.bibNumber||'-')+'</span>'
    +'</div>';
  if(!allRecs.length){html+='<p style="color:var(--muted);font-size:.85rem;margin-top:8px">尚無打卡記錄</p></div>';return html;}
  html+='<div class="station-stats" style="margin-top:10px">';
  const firstRec=allRecs[0];
  stations.forEach((s,i)=>{
    const rec=allRecs.find(x=>x.station===s);
    const arrived=!!rec;
    const total=arrived&&i>0?diffHMS(rec.scanTime,firstRec.scanTime):null;
    html+='<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)">'
      +'<span class="station-num" style="background:'+(arrived?'var(--green)':'var(--surface2)')+';color:'+(arrived?'#fff':'var(--muted)')+';">'+(i+1)+'</span>'
      +'<span style="flex:1;font-size:.88rem">'+esc(s)+'</span>'
      +(arrived
        ?'<span style="font-family:var(--mono);font-size:.82rem">'+fmt(rec.scanTime)+'</span>'
          +(total?'<span style="font-family:var(--mono);font-size:.78rem;color:var(--muted);margin-left:8px">'+total+'</span>':'')
        :'<span style="color:var(--muted);font-size:.82rem">未到</span>')
      +'</div>';
  });
  html+='</div></div>';
  return html;
}
