<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3349;--accent:#f97316;--accent2:#fb923c;--green:#22c55e;--red:#ef4444;--text:#e8eaf0;--muted:#6b7280;--mono:'DM Mono',monospace;--sans:'Noto Sans TC',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
.wrap{max-width:560px;margin:0 auto;padding:20px;padding-bottom:90px;}
.header{text-align:center;padding:24px 0 16px;}
.header .logo{font-size:2rem;margin-bottom:4px;}
.header .title{font-size:1.2rem;font-weight:900;}
.header .sub{font-size:.78rem;color:var(--muted);margin-top:2px;}
.tabs{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:20px;gap:4px;}
.tab{flex:1;text-align:center;padding:10px 4px;border-radius:8px;font-size:.82rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;}
.tab.active{background:var(--accent);color:#fff;}
.page{display:none;}
.page.active{display:block;}
.input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:var(--sans);font-size:.92rem;outline:none;transition:border-color .2s;}
.input:focus{border-color:var(--accent);}
.input-group{margin-bottom:14px;}
.input-group label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
.input-row{display:flex;gap:8px;align-items:flex-start;}
.input-row .input{flex:1;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:13px 18px;border-radius:8px;border:none;font-family:var(--sans);font-size:.92rem;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm{padding:6px 12px;font-size:.78rem;border-radius:6px;}
.btn-full{width:100%;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
.csv-hint{font-size:.78rem;color:var(--muted);margin-bottom:16px;padding:10px 12px;background:var(--surface2);border-radius:8px;border-left:3px solid var(--accent);line-height:1.6;}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:700;background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.badge-green{background:rgba(34,197,94,.1);color:var(--green);border-color:rgba(34,197,94,.3);}
.runner-card-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;font-size:.95rem;}
.station-stats{display:flex;flex-direction:column;gap:8px;}
.station-num{background:var(--accent);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;}
.loading-cell{text-align:center;color:var(--muted);padding:30px 10px;font-size:.85rem;}
.qr-box{display:flex;flex-direction:column;align-items:center;gap:12px;padding:20px;background:#fff;border-radius:12px;margin-top:12px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:.88rem;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.4);opacity:0;transition:all .25s;z-index:9999;max-width:90vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.success{border-left:4px solid var(--green);}
.toast.error{border-left:4px solid var(--red);}
.status-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:700;}
/* ── 關於 Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;z-index:500;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:360px;max-width:92vw;max-height:88vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.6);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.about-title{font-size:1.1rem;font-weight:900;color:var(--accent);margin-bottom:16px;}
.about-row{display:flex;align-items:flex-start;padding:3px 0;font-size:.85rem;}
.about-row .about-label{width:80px;flex-shrink:0;color:var(--muted);}
.about-row .about-value{flex:1;color:var(--text);word-break:break-all;}
.about-row .about-value a{color:var(--accent);text-decoration:underline;}
.about-divider{height:1px;background:var(--border);margin:14px 0;}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, query, orderBy, where, serverTimestamp, writeBatch, deleteField, runTransaction, getCountFromServer } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-functions.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWn7703qi0X6rL2c4WBhieTZ2-_JSrvco",
  authDomain: "road-running-check-in-system.firebaseapp.com",
  projectId: "road-running-check-in-system",
  storageBucket: "road-running-check-in-system.firebasestorage.app",
  messagingSenderId: "19800079371",
  appId: "1:19800079371:web:157af22aa9f1533387db0e"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
// Cloud Functions（報名交易處理部署在 asia-east1 台灣區域）
const functions = getFunctions(app, 'asia-east1');

// ── 匿名登入（使用者無感）──
// firestore.rules 現在要求所有讀寫至少要有登入身分，這裡在背景自動
// 取得匿名身分，選手不需要註冊任何帳號。登入狀態會存在瀏覽器裡，
// 之後重新開啟頁面會直接沿用，不會每次都建立新帳號。
async function ensureAuth(){
  if (auth.currentUser) return;
  try { await signInAnonymously(auth); }
  catch(e){ showToast('連線初始化失敗，請重新整理頁面：'+e.message,'error'); throw e; }
}

// ── 邀請碼雜湊 ──
// 邀請碼在資料庫裡只存 SHA-256 雜湊（inviteCodeHash），不存明文——
// 組別文件是公開可讀的，存明文等於把邀請碼直接送給所有人。
// 驗證時把使用者輸入做同樣的雜湊再比對。
async function sha256Hex(text){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
// 檢查這個組別是否設有邀請碼（新版存雜湊；相容還沒重新儲存過的舊資料明文）
function groupHasInvite(g){
  return !!(g&&((g.inviteCodeHash&&g.inviteCodeHash.trim())||(g.inviteCode&&g.inviteCode.trim())));
}
// 驗證邀請碼是否正確（優先比對雜湊，退回舊版明文）
async function checkInviteCode(g,input){
  const v=(input||'').trim();
  if(g.inviteCodeHash&&g.inviteCodeHash.trim()){
    return (await sha256Hex(v))===g.inviteCodeHash.trim();
  }
  return v===(g.inviteCode||'').trim();
}


// ── HTML escape（防止使用者輸入被當作HTML/JS執行）──
function esc(v) {
  return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escJs(v) {
  return String(v ?? '')
    .replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/\r/g,'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 工具函式 ──
function fmt(ts) {
  if (!ts) return '-';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString('zh-TW', {hour12:false});
}
function diffHMS(a, b) {
  if (!a || !b) return '-';
  const da = a.toDate ? a.toDate() : new Date(a);
  const db2 = b.toDate ? b.toDate() : new Date(b);
  const s = Math.max(0, Math.floor((da - db2) / 1000));
  return String(Math.floor(s/3600)).padStart(2,'0')+':'+String(Math.floor((s%3600)/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}
function toHalf(str) {
  if (!str) return str;
  return str.replace(/[！-～]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
            .replace(/　/g, ' ');
}
function applyHalf(el) {
  const v = toHalf(el.value);
  if (v !== el.value) { el.value = v; el.dispatchEvent(new Event('input')); }
}
window.toHalf = toHalf;
window.applyHalf = applyHalf;

function autoSlashDate(el) {
  const isDelete = el._lastLen !== undefined && el.value.length < el._lastLen;
  el._lastLen = el.value.length;
  if (isDelete) return;
  const pos = el.selectionStart;
  const raw = el.value;
  const digits = raw.replace(/\D/g, '').slice(0, 8);
  let out = digits;
  if (digits.length > 4) out = digits.slice(0,4) + '/' + digits.slice(4);
  if (digits.length > 6) out = digits.slice(0,4) + '/' + digits.slice(4,6) + '/' + digits.slice(6);
  if (out !== raw) {
    const slashesBeforeInRaw = (raw.slice(0, pos).match(/\//g) || []).length;
    const slashesBeforeInOut = (out.slice(0, pos).match(/\//g) || []).length;
    const newPos = Math.min(pos + (slashesBeforeInOut - slashesBeforeInRaw), out.length);
    el.value = out;
    el._lastLen = out.length;
    try { el.setSelectionRange(newPos, newPos); } catch(e) {}
  }
}
window.autoSlashDate = autoSlashDate;

// ── 全形→半形：統一監聽所有 input ──
document.addEventListener('input', function(e) {
  const el = e.target;
  const tag = el.tagName;
  const type = (el.type||'').toLowerCase();
  if (tag !== 'INPUT' && tag !== 'TEXTAREA') return;
  if (['checkbox','radio','file','date','datetime-local','time','color','range'].includes(type)) return;
  const v = toHalf(el.value);
  if (v !== el.value) {
    const pos = el.selectionStart;
    el.value = v;
    try { el.setSelectionRange(pos, pos); } catch(e) {}
  }
  if (el.dataset.fmt === 'ymd') autoSlashDate(el);
}, true);

function validateBirthday(v) {
  if (!v) return true; // 空值由呼叫端決定是否必填
  if (!/^\d{4}\/\d{2}\/\d{2}$/.test(v)) return false;
  const [y,m,d] = v.split('/').map(Number);
  const dt = new Date(y,m-1,d);
  if(dt.getFullYear()!==y||dt.getMonth()!==m-1||dt.getDate()!==d) return false;
  if(y<1900) return false;
  const today=new Date(); today.setHours(0,0,0,0);
  if(dt>=today) return false; // 不能是今天或未來
  return true;
}
window.validateBirthday=validateBirthday;
function validatePhone(v) { return /^09\d{8}$/.test(v); }
function validateEmail(v) {
  if (!v) return true;
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
}
function validateId(v) {
  if (!v) return true;
  return /^[A-Za-z]\d{9}$/.test(v);
}
function setFieldError(id, hasError) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.borderColor = hasError ? 'var(--red)' : '';
}
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+type;
  setTimeout(()=>t.classList.remove('show'),3500);
}
// qrcodejs 對多位元組(中文)字元處理有bug，需先轉換為UTF-8位元組序列
function utf16to8(str){
  let out='';
  for(let i=0;i<str.length;i++){
    const c=str.charCodeAt(i);
    if(c>=0x0001&&c<=0x007F){
      out+=str.charAt(i);
    }else if(c>0x07FF){
      out+=String.fromCharCode(0xE0|((c>>12)&0x0F));
      out+=String.fromCharCode(0x80|((c>>6)&0x3F));
      out+=String.fromCharCode(0x80|((c>>0)&0x3F));
    }else{
      out+=String.fromCharCode(0xC0|((c>>6)&0x1F));
      out+=String.fromCharCode(0x80|((c>>0)&0x3F));
    }
  }
  return out;
}
function makeQRCode(el,text,size){
  el.innerHTML='';
  new QRCode(el,{text:utf16to8(text),width:size,height:size});
}

// ── 頁籤切換 ──
window.showPage=function(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelector('.tab[data-page="'+id+'"]').classList.add('active');
  if(id==='lookup') initLookupPage();
  if(id==='signup') initSignupPage();
  if(id==='status') initStatusPage();
}

// ════════════════════════════
// 報名表單
// ════════════════════════════
let signupEvents=[]; // 開放報名的賽事清單
let curSignupEvent=null;
let curSignupCustomFields=[];
let lastSignupEventId=null; // 記住上次選的賽事
let curSignupNeedsParental=false; // 是否需要顯示家長陪同區塊（單一事實來源）

// 判斷選手報名是否開放（OR 邏輯：任一條件符合即開放）
function isRunnerRegOpen(ev, entryCount) {
  const now = Date.now();
  // 條件1：手動開關 ON → 一律可報名
  if (ev.registrationOpen) return true;
  // 未手動開放：須同時符合「時間範圍內」且「人數未滿」才能報名
  // 時間範圍：未設定視為不限制（通過）
  const start = ev.registrationStartAt?.toDate?.()?.getTime() ?? null;
  const end   = ev.registrationEndAt?.toDate?.()?.getTime() ?? null;
  const afterStart = (start === null || now >= start);
  const beforeEnd  = (end   === null || now <= end);
  const inTimeRange = afterStart && beforeEnd;
  // 人數上限：0 或未設定視為不限制（通過）
  const cap = ev.registrationCapacity ?? 0;
  const underCapacity = (cap === 0 || entryCount < cap);
  return inTimeRange && underCapacity;
}

// 產生報名資訊說明文字（顯示在賽事資訊卡）
function buildRegInfoHtml(ev, entryCount) {
  const fmtDT = ts => {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const pad = n => String(n).padStart(2,'0');
    return d.getFullYear()+'/'+pad(d.getMonth()+1)+'/'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
  };
  const lines = [];
  if (ev.registrationStartAt) lines.push('報名開始：' + fmtDT(ev.registrationStartAt));
  if (ev.registrationEndAt)   lines.push('報名截止：' + fmtDT(ev.registrationEndAt));
  const cap = ev.registrationCapacity ?? 0;
  if (cap > 0) lines.push('報名人數：' + entryCount + ' / ' + cap);
  return lines.length ? lines.map(l=>'<div style="font-size:.75rem;color:var(--muted);margin-top:3px">'+l+'</div>').join('') : '';
}

async function initSignupPage(){
  signupEvents=[];
  const content=document.getElementById('signupContent');
  content.innerHTML='<div class="card"><div class="loading-cell">載入中...</div></div>';
  // 取得所有賽事，由前端做開放判斷
  const snap=await getDocs(query(collection(db,'events'), orderBy('createdAt','desc')));
  const openEvents=[];
  for(const d of snap.docs){
    const ev={id:d.id,...d.data()};
    // 取目前報名人數：用聚合計數查詢，只回傳數字、不下載整個報名集合
    const countSnap=await getCountFromServer(collection(db,'events',d.id,'runners'));
    ev._entryCount = countSnap.data().count;
    if(isRunnerRegOpen(ev, ev._entryCount)) openEvents.push(ev);
  }
  signupEvents=openEvents;
  if(!signupEvents.length){
    content.innerHTML='<div class="card"><div class="loading-cell">目前沒有開放報名的賽事</div></div>';
    return;
  }
  if(signupEvents.length===1){
    await selectSignupEvent(signupEvents[0].id);
  } else {
    let html='<div class="card"><div class="input-group"><label>選擇賽事</label><select id="signupEventSelect" class="input" onchange="onSignupEventSelect()">';
    html+='<option value="">請選擇...</option>';
    signupEvents.forEach(ev=>{
      const selected=(lastSignupEventId&&ev.id===lastSignupEventId)?' selected':'';
      html+='<option value="'+ev.id+'"'+selected+'>'+esc(ev.name)+(ev.date?'（'+esc(ev.date)+'）':'')+'</option>';
    });

    }
  }
}

// ── 組別切換時動態顯示限制欄位 ──
window.onSignupGroupChange=function(){
  const group=document.getElementById('suGroup')?.value;
  const g=window._signupGroupMap?.[group];
  const inviteRow=document.getElementById('suInviteCodeRow');
  const parentalBlock=document.getElementById('suParentalBlock');
  const hint=document.getElementById('suGroupHint');
  if(inviteRow){inviteRow.style.display='none';document.getElementById('suInviteCode').value='';}
  // 家長區塊的顯示與旗標一律交給 updateParentalBlock 統一維護
  //（放在提早 return 之前，「未選組別」時旗標也會被正確重設為 false）
  updateParentalBlock();
  if(!g||!hint)return;
  // 限制摘要
  const hints=[];
  if(g.genderLimit)hints.push('限'+g.genderLimit+'性');
  if(g.ageMin>0)hints.push(g.ageMin+'歲以上');
  if(g.ageMax>0)hints.push(g.ageMax+'歲以下');
  if(g.groupCapacity>0)hints.push('限'+g.groupCapacity+'人');
  if(g.parentalAge>0)hints.push(g.parentalAge+'歲以下須家長陪同聲明');
  hint.textContent=hints.length?'此組別限制：'+hints.join('、'):'';
  // 邀請碼
  if(inviteRow&&groupHasInvite(g))inviteRow.style.display='';
}

// 依目前填寫的生日判斷是否需要顯示家長聲明區塊，並更新模組變數 curSignupNeedsParental
window.updateParentalBlock=function updateParentalBlock(){
  const group=document.getElementById('suGroup')?.value;
  const g=window._signupGroupMap?.[group];
  const block=document.getElementById('suParentalBlock');
  if(!block)return;
  if(!g||!(g.parentalAge>0)){curSignupNeedsParental=false;block.style.display='none';return;}
  const birthday=document.getElementById('suBirthday')?.value.trim();
  if(birthday&&validateBirthday(birthday)){
    const evDate=curSignupEvent?.date||new Date().getFullYear()+'-01-01';
    const age=calcAgeRunner(birthday,evDate);
    // 算不出年齡（日期異常）時保守隱藏——伺服器端會用權威資料做最終判斷
    if(age===null||age>=g.parentalAge){curSignupNeedsParental=false;block.style.display='none';return;}
    curSignupNeedsParental=true;block.style.display='';
  }else{
    curSignupNeedsParental=false;block.style.display='none';
  }
}

window.calcAgeRunner=function calcAgeRunner(birthday,eventDate){
  if(!birthday||!eventDate)return null;
  const [by,bm,bd]=birthday.split(/[/-]/).map(Number);
  const [ey,em,ed]=eventDate.split(/[/-]/).map(Number);
  if(!by||!ey)return null;
  let age=ey-by;
  if(em<bm||(em===bm&&ed<bd))age--;
  return age;
}

// ── 即時號碼重複檢查（自選號碼用）──
window.checkBibAvailable=async function(){
  const el=document.getElementById('suBib');
  const hint=document.getElementById('suBibHint');
  if(!el||!hint)return;
  const bib=el.value.trim();
  if(!bib){hint.textContent='';el.style.borderColor='';return;}
  const n=parseInt(bib);
  if(isNaN(n)||String(n)!==bib.replace(/^0+/,'')||n<1){
    el.style.borderColor='var(--red)';
    hint.innerHTML='<span style="color:var(--red)">❌ 請輸入正整數</span>';
    return;
  }
  // 範圍檢查
  if(curSignupEvent){
    const rMin=curSignupEvent.bibRangeMin||0;
    const rMax=curSignupEvent.bibRangeMax||0;
    if(rMin>0&&rMax>0&&(n<rMin||n>rMax)){
      el.style.borderColor='var(--red)';
      hint.innerHTML='<span style="color:var(--red)">❌ 號碼須在 '+rMin+'～'+rMax+' 之間</span>';
      return;
    }
  }
  if(!curSignupEvent){return;}
  // 只查這一個號碼有沒有被用過，不下載整個報名集合
  const pad=curSignupEvent.bibPadLength||3;
  const padded=String(n).padStart(pad,'0');
  const snap=await getDocs(query(collection(db,'events',curSignupEvent.id,'runners'),where('bibNumber','==',padded)));
  const dup=!snap.empty;
  if(dup){
    el.style.borderColor='var(--red)';
    hint.innerHTML='<span style="color:var(--red)">❌ 此號碼已被使用，請換一個</span>';
  }else{
    el.style.borderColor='var(--green)';
    hint.innerHTML='<span style="color:var(--green)">✅ 號碼 '+padded+' 可使用</span>';
  }
}

window.submitSignup=async function(){
  const eventId=curSignupEvent.id;
  const group=document.getElementById('suGroup').value;
  const name=document.getElementById('suName').value.trim();
  const gender=document.getElementById('suGender').value;
  const birthday=document.getElementById('suBirthday').value.trim();
  const fs=curSignupEvent.fieldSettings||{};
  const phone=(fs.phone?.show!==false)?document.getElementById('suPhone')?.value.trim()||''  :'';
  const email=(fs.email?.show!==false)?document.getElementById('suEmail')?.value.trim()||''  :'';
  const idNumber=(fs.idNumber?.show!==false)?document.getElementById('suIdNumber')?.value.trim()||'':'';
  const note=document.getElementById('suNote').value.trim();

  if(!name){showToast('請填寫姓名','error');return;}
  if(!gender){showToast('請選擇性別','error');return;}
  if(!birthday){setFieldError('suBirthday',true);showToast('請填寫生日','error');return;}
  if(!/^\d{4}\/\d{2}\/\d{2}$/.test(birthday)){setFieldError('suBirthday',true);showToast('生日格式錯誤（yyyy/mm/dd）','error');return;}
  {
    const [by,bm,bd]=birthday.split('/').map(Number);
    const dt=new Date(by,bm-1,bd);
    const today=new Date();today.setHours(0,0,0,0);
    if(dt.getFullYear()!==by||dt.getMonth()!==bm-1||dt.getDate()!==bd){setFieldError('suBirthday',true);showToast('生日日期不存在','error');return;}
    if(dt>=today){setFieldError('suBirthday',true);showToast('生日不能是今天或未來日期','error');return;}
    if(by<1900){setFieldError('suBirthday',true);showToast('生日年份不合理','error');return;}
  }
  if(fs.phone?.show!==false){
    if(fs.phone?.required&&!phone){setFieldError('suPhone',true);showToast('請填寫手機號碼','error');return;}
    if(phone&&!validatePhone(phone)){setFieldError('suPhone',true);showToast('手機號碼格式錯誤（09開頭10碼）','error');return;}
  }
  if(fs.email?.show!==false){
    if(fs.email?.required&&!email){setFieldError('suEmail',true);showToast('請填寫 E-Mail','error');return;}
    if(!validateEmail(email)){setFieldError('suEmail',true);showToast('請填寫正確的Email格式','error');return;}
  }
  if(fs.idNumber?.show!==false){
    if(fs.idNumber?.required&&!idNumber){setFieldError('suIdNumber',true);showToast('請填寫身分證字號','error');return;}
    if(!validateId(idNumber)){setFieldError('suIdNumber',true);showToast('請填寫正確的身分證字號格式','error');return;}
  }

  // 組別限制驗證
  const inviteInput=document.getElementById('suInviteCode')?.value.trim()||'';
  const g=window._signupGroupMap?.[group];
  if(g){
    const evDate=curSignupEvent?.date||'';
    if(g.genderLimit&&gender&&g.genderLimit!==gender){showToast('此組別限'+g.genderLimit+'性報名','error');return;}
    if(birthday&&evDate){
      const age=calcAgeRunner(birthday,evDate);
      if(age!==null){
        if(g.ageMin>0&&age<g.ageMin){showToast('此組別年齡限制 '+g.ageMin+' 歲以上（您的年齡：'+age+'歲）','error');return;}
        if(g.ageMax>0&&age>g.ageMax){showToast('此組別年齡限制 '+g.ageMax+' 歲以下（您的年齡：'+age+'歲）','error');return;}
      }
    }
    if(groupHasInvite(g)&&!(await checkInviteCode(g,inviteInput))){showToast('邀請碼不正確','error');return;}
    // 家長陪同聲明：送出前即時重算（依目前的組別＋生日），
    // 不依賴可能殘留的旗標
    updateParentalBlock();
    if(curSignupNeedsParental){
      const consent=document.getElementById('suParentalConsent');
      const parentName=document.getElementById('suParentName')?.value.trim()||'';
      const parentPhone=document.getElementById('suParentPhone')?.value.trim()||'';
      if(!consent?.checked){showToast('請勾選家長陪同聲明','error');return;}
      if(!parentName){showToast('請填寫緊急聯絡人姓名','error');return;}
      if(!parentPhone||!validatePhone(parentPhone)){showToast('請填寫正確的緊急聯絡人手機','error');return;}
    }
    // 組別名額
    if(g.groupCapacity>0){
      const capSnap=await getCountFromServer(query(collection(db,'events',curSignupEvent.id,'runners'),where('group','==',group)));
      if(capSnap.data().count>=g.groupCapacity){showToast('此組別已額滿（'+g.groupCapacity+'人）','error');return;}
    }
  }

  // 自訂欄位必填驗證 + 收集
  const customData={};
  for(const f of curSignupCustomFields){
    const el=document.getElementById('su_cf_'+f.id);
    if(!el)continue;
    if(f.type==='checkbox'){customData[f.id]=el.checked;}
    else{
      const v=el.value.trim();
      if(f.required&&!v){showToast('「'+f.label+'」為必填','error');return;}
      customData[f.id]=v;
    }
  }

  const runnerData={name,gender,birthday,phone,email,idNumber,note};

  // 收集家長陪同資料（curSignupNeedsParental 已在上方即時重算過）
  const parentalDataForSet=(()=>{
    if(!curSignupNeedsParental)return{};
    const agreed=document.getElementById('suParentalConsent')?.checked||false;
    if(!agreed)return{};
    return{parentalConsentAgreed:true,parentName:document.getElementById('suParentName')?.value.trim()||'',parentPhone:document.getElementById('suParentPhone')?.value.trim()||''};
  })();
  // update 用版（隱藏時帶 deleteField，用於 updateDoc 已報名更新）
  const parentalDataForUpdate=curSignupNeedsParental
    ?parentalDataForSet
    :{parentalConsentAgreed:deleteField(),parentName:deleteField(),parentPhone:deleteField()};

  // 自選號碼（若開放且有填）
  const customBibEl=document.getElementById('suBib');
  const customBibRaw=customBibEl?customBibEl.value.trim():'';
  let customBib='';
  if(customBibRaw){
    const n=parseInt(customBibRaw);
    if(isNaN(n)||n<1){showToast('號碼請輸入正整數','error');return;}
    const rMin=curSignupEvent.bibRangeMin||0;
    const rMax=curSignupEvent.bibRangeMax||0;
    if(rMin>0&&rMax>0&&(n<rMin||n>rMax)){
      showToast('號碼須在 '+rMin+'～'+rMax+' 之間','error');
      if(customBibEl)customBibEl.style.borderColor='var(--red)';
      return;
    }
    const pad=curSignupEvent.bibPadLength||3;
    customBib=String(n).padStart(pad,'0');
  }
  // 若填了號碼，先做最終重複確認
  if(customBib){
    const dupSnap=await getDocs(query(collection(db,'events',curSignupEvent.id,'runners'),where('bibNumber','==',customBib)));
    if(!dupSnap.empty){
      showToast('號碼 '+customBib+' 已被使用，請重新填寫','error');
      if(customBibEl){customBibEl.style.borderColor='var(--red)';}
      return;
    }
  }

  const btn=document.querySelector('#signupContent .btn-primary, #signupForm .btn-primary');
  btn.textContent='送出中...'; btn.disabled=true;
  try{
    // ══════════════════════════════════════════════════════════
    // 報名的所有「真正的檢查與寫入」已搬進 Cloud Function
    // （functions/index.js 的 runnerSignup），在伺服器端以原子交易處理：
    //   - 比對現有選手（個資不再下載到瀏覽器）
    //   - 名額 / 邀請碼 / 年齡性別限制（無法被繞過，名額不會超收）
    //   - 重複報名檢查、流水號與號碼配發（不會撞號）
    // 上面的前端檢查只是使用體驗的預檢，把關以伺服器為準。
    // ══════════════════════════════════════════════════════════
    const runnerSignupFn=httpsCallable(functions,'runnerSignup');
    const payload={
      eventId,group,name,gender,birthday,phone,email,idNumber,note,customData,
      inviteCode:document.getElementById('suInviteCode')?.value.trim()||'',
      customBib:customBib||'',
      parental:(parentalDataForSet.parentalConsentAgreed
        ?{consent:true,parentName:parentalDataForSet.parentName,parentPhone:parentalDataForSet.parentPhone}
        :null),
      matchDecision:null,matchDocId:''
    };
    let res=(await runnerSignupFn(payload)).data;

    // 找到相似選手：顯示確認對話框（伺服器只回傳「哪些欄位有差異」，
    // 不回傳資料庫裡的舊值，避免個資外洩），再帶著使用者的決定重新呼叫
    if(res.status==='needs-confirmation'){
      btn.textContent='送出報名'; btn.disabled=false;
      const rows=(res.fields||[]).map(f=>{
        let dbCell,rowStyle='';
        if(f.status==='match'){rowStyle='color:var(--green)';dbCell=esc(f.value||'');}
        else if(f.status==='db-empty'){dbCell='';}
        else{rowStyle='color:var(--accent)';dbCell='<span style="font-size:.75rem;padding:2px 6px;background:rgba(249,115,22,.12);border-radius:4px;border:1px solid rgba(249,115,22,.3)">有差異</span>';}
        const cur=({'姓名':name,'性別':gender,'生日':birthday,'手機':phone,'Email':email,'身分證':idNumber})[f.label]||'';
        return '<tr style="'+rowStyle+'">'
          +'<td style="padding:4px 8px;font-size:.78rem;color:var(--muted);white-space:nowrap;border:none">'+esc(f.label)+'</td>'
          +'<td style="padding:4px 8px;font-size:.85rem;word-break:break-all;border:none">'+dbCell+'</td>'
          +'<td style="padding:4px 8px;font-size:.85rem;word-break:break-all;border:none">'+esc(cur)+'</td>'
          +'</tr>';
      }).join('');
      const hintHtml=(res.suggestRefill||[]).length
        ?'<div style="font-size:.75rem;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.25);border-radius:8px;padding:8px 12px;margin-bottom:12px;line-height:1.6">'
          +'💡 建議補填 <strong>'+esc(res.suggestRefill.join('、'))+'</strong>，有助於進一步確認是否為同一人。'
          +'<br><span style="color:var(--muted)">可點「重填」回到表單補充資料。</span></div>'
        :'';
      const dialog=document.createElement('div');
      dialog.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9998;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box';
      dialog.innerHTML='<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;max-width:480px;width:100%;box-sizing:border-box;overflow:hidden">'
        +'<div style="font-size:1rem;font-weight:700;margin-bottom:4px">找到相似的資料</div>'
        +'<div style="font-size:.78rem;color:var(--muted);margin-bottom:12px">綠色為相符欄位；橘色欄位有差異，請確認是否為同一人。</div>'
        +'<table style="width:100%;border-collapse:collapse;table-layout:fixed;margin-bottom:14px">'
        +'<colgroup><col style="width:52px"><col><col></colgroup>'
        +'<thead><tr><th style="padding:4px 8px;font-size:.72rem;color:var(--muted);text-align:left;border:none"></th>'
        +'<th style="padding:4px 8px;font-size:.72rem;color:var(--muted);text-align:left;border:none">資料庫</th>'
        +'<th style="padding:4px 8px;font-size:.72rem;color:var(--muted);text-align:left;border:none">您填寫的</th></tr></thead>'
        +'<tbody>'+rows+'</tbody></table>'
        +hintHtml
        +'<div style="font-size:.75rem;color:var(--accent);margin-bottom:12px">⚠️ 若選「同一人」，則以新資料取代舊資料！</div>'
        +'<div style="display:flex;gap:8px;flex-wrap:wrap">'
        +'<button id="dlgSame" class="btn btn-primary btn-sm">✅ 同一人</button>'
        +'<button id="dlgNew" class="btn btn-ghost btn-sm">👤 非同一人</button>'
        +'<button id="dlgRefill" class="btn btn-ghost btn-sm">✏️ 重填</button>'
        +'</div></div>';
      document.body.appendChild(dialog);
      const choice=await new Promise(resolve=>{
        dialog.querySelector('#dlgSame').onclick=()=>{dialog.remove();resolve('same');};
        dialog.querySelector('#dlgNew').onclick=()=>{dialog.remove();resolve('new');};
        dialog.querySelector('#dlgRefill').onclick=()=>{dialog.remove();resolve('refill');};
      });
      if(choice==='refill') return;
      btn.textContent='送出中...'; btn.disabled=true;
      res=(await runnerSignupFn({...payload,matchDecision:choice,matchDocId:res.matchDocId})).data;
      // 極少見：兩次呼叫之間比對對象變了，伺服器要求重新確認
      if(res.status==='needs-confirmation'){
        showToast('資料剛有變動，請再送出一次確認','error');
        btn.textContent='送出報名'; btn.disabled=false; return;
      }
    }

    if(res.status==='already-registered'){
      showToast('選手資料已更新，您已報名過此賽事');
      btn.textContent='送出報名'; btn.disabled=false; return;
    }
    if(res.status==='reactivated'){
      showToast('已為您重新啟用此賽事的報名（取消申請已自動撤回）');
      btn.textContent='送出報名'; btn.disabled=false; return;
    }
    showSignupSuccess({uniqueId:res.uniqueId,name,gender,group,bibNumber:res.bibNumber,eventName:curSignupEvent.name,eventDate:curSignupEvent.date});
  }catch(e){
    showToast('報名失敗：'+e.message,'error');
    const b=document.querySelector('#signupContent .btn-primary, #signupForm .btn-primary');
    if(b){b.textContent='送出報名';b.disabled=false;}
  }
}

let allStatusEvents=[];

async function initStatusPage(){
  const content=document.getElementById('statusContent');
  content.innerHTML='<div class="card"><div class="loading-cell">載入中...</div></div>';
  const snap=await getDocs(query(collection(db,'events'),orderBy('createdAt','desc')));
  allStatusEvents=snap.docs.map(d=>({id:d.id,...d.data()}));
  if(!allStatusEvents.length){
    content.innerHTML='<div class="card"><div class="loading-cell">目前沒有賽事資料</div></div>';
    return;
  }
  if(allStatusEvents.length===1){
    await selectStatusEvent(allStatusEvents[0].id);
  } else {
    let html='<div class="card"><div class="input-group"><label>選擇賽事</label>'
      +'<select id="statusEventSelect" class="input" onchange="onStatusEventSelect()">'
      +'<option value="">請選擇...</option>';
    allStatusEvents.forEach(ev=>{
      const selected=(lastStatusEventId&&ev.id===lastStatusEventId)?' selected':'';
      html+='<option value="'+ev.id+'"'+selected+'>'+esc(ev.name)+(ev.date?'（'+esc(ev.date)+'）':'')+'</option>';
    });
    html+='</select></div></div><div id="statusForm"></div>';
    content.innerHTML=html;
    // 若有記住的賽事，自動帶入表單
    if(lastStatusEventId&&allStatusEvents.find(e=>e.id===lastStatusEventId)){
      await selectStatusEvent(lastStatusEventId, true);
    }
  }
}

// 查詢狀態的驗證憑證與資料快取：
// 選手個資已從公開可讀的資料庫下架，查詢/修改/取消全部改走 Cloud Function
// （runnerStatus / runnerAction），每個動作都在伺服器端重新驗證身分。
// 這裡暫存查詢時輸入的憑證（姓名/性別/生日）供後續動作使用。
let statusCred=null;
let statusCache={};
window.doStatusQuery=async function(){
  if(!curStatusEvent){showToast('請先選擇賽事','error');return;}
  const bib=document.getElementById('statusBib').value.trim();
  const name=document.getElementById('statusName').value.trim();
  const gender=document.getElementById('statusGender').value;
  const birthday=document.getElementById('statusBirthday').value.trim();
  const result=document.getElementById('statusResult');
  if(!bib||!name||!gender||!birthday){showToast('請填寫全部四個欄位','error');return;}
  result.innerHTML='<div class="card"><div class="loading-cell">查詢中...</div></div>';

  const eventId=curStatusEvent.id;
  const ev=curStatusEvent;
  let res;
  try{
    res=(await httpsCallable(functions,'runnerStatus')({eventId,bib,name,gender,birthday})).data;
  }catch(err){
    result.innerHTML='<div class="card"><div class="loading-cell" style="color:var(--red)">查詢失敗：'+esc(err.message)+'</div></div>';
    return;
  }
  statusCred={name,gender,birthday};
  statusCache={};

  let html=''; let found=false;
  const matched=[];
  for(const m of (res.matched||[])){
    const e=m.entry;
    const eDoc={id:m.entryDocId};
    const entryName=m.profile.name||'';
    statusCache[m.entryDocId]=m;
    found=true;
    matched.push({eDoc, e});
    const cardId='statusCard_'+eventId+'_'+eDoc.id;
    html+='<div class="card" id="'+cardId+'">';
    html+='<div style="font-size:.78rem;color:var(--muted);margin-bottom:8px">'+esc(ev.name)+(ev.date?'　'+esc(ev.date):'')+'</div>';
    html+='<div class="runner-card-header">';
    html+='<strong style="font-size:1.05rem">'+esc(entryName)+'</strong>';
    html+='<span class="badge">'+esc(e.group||'-')+'</span>';
    html+='<span class="badge">編號 '+esc(e.bibNumber||'-')+'</span>';
    html+='<span class="mono" style="font-size:.78rem;color:var(--accent)">'+esc(e.uniqueId)+'</span>';
    html+='</div>';
    html+='<div id="statusQR_'+eventId+'_'+eDoc.id+'" class="qr-box"></div>';
    if(isRunnerRegOpen(ev, 0)){
      if(e.cancelRequested){
        html+='<div id="'+cardId+'_actions">';
        html+='<div style="padding:10px 12px;background:var(--surface2);border-radius:8px;font-size:.82rem;color:var(--muted);margin-bottom:8px">⏳ 已送出取消申請，請等待主辦方確認</div>';
        html+='<button class="btn btn-ghost btn-full" onclick="withdrawCancelRequest(\''+eventId+'\',\''+eDoc.id+'\',\''+escJs(e.uniqueId)+'\',\''+cardId+'\')">↩️ 撤銷取消申請</button>';
        html+='</div>';
      } else {
        html+='<div id="'+cardId+'_actions">';
        html+='<div id="'+cardId+'_edit" style="margin-top:12px"></div>';
        html+='<div style="display:flex;gap:8px;margin-top:8px">';
        html+='<button class="btn btn-ghost btn-full" onclick="showEditForm(\''+eventId+'\',\''+eDoc.id+'\',\''+escJs(e.uniqueId)+'\',\''+cardId+'\')">✏️ 修改報名資料</button>';
        html+='<button class="btn btn-danger btn-sm" onclick="requestCancelEntry(\''+eventId+'\',\''+eDoc.id+'\',\''+cardId+'\')">🗑️ 申請取消報名</button>';
        html+='</div>';
        html+='</div>';
      }
    }
    html+='</div>';
  }
  if(!found){
    result.innerHTML='<div class="card"><div class="loading-cell" style="color:var(--red)">查無資料，請確認四項資料是否正確</div></div>';
    return;
  }
  result.innerHTML=html;
  for(const {eDoc, e} of matched){
    const el=document.getElementById('statusQR_'+eventId+'_'+eDoc.id);
    if(!el)continue;
    makeQRCode(el, [e.uniqueId,e.bibNumber||''].join('|'), 180);
  }
}

window.requestCancelEntry=async function(eventId, entryDocId, cardId){
  if(!confirm('確定要送出取消報名申請？\n（送出後請等待主辦方審核確認，不會立即取消，個人資料也不會被刪除）'))return;
  try{
    // 透過 Cloud Function 執行（伺服器端重新驗證身分）

    const actions=document.getElementById(cardId+'_actions');

    showToast('已送出取消申請');

// ── 修改號碼時的即時重複檢查 ──
window.checkEditBibAvailable=async function(eventId, entryDocId, cardId){
  const el=document.getElementById(cardId+'_eBib');
  const hint=document.getElementById(cardId+'_eBibHint');
  if(!el||!hint)return;
  const bib=el.value.trim();
  if(!bib){hint.textContent='';el.style.borderColor='';return;}
  const n=parseInt(bib);
  if(isNaN(n)||n<1){
    el.style.borderColor='var(--red)';
    hint.innerHTML='<span style="color:var(--red)">❌ 請輸入正整數</span>';
    return;
  }
  // 範圍檢查（從 hidden input 讀取）
  const rangeEl=document.getElementById(cardId+'_bibRange');
  const rMin=rangeEl?parseInt(rangeEl.dataset.min)||0:0;
  const rMax=rangeEl?parseInt(rangeEl.dataset.max)||0:0;
  const pad=rangeEl?parseInt(rangeEl.dataset.pad)||3:3;
  if(rMin>0&&rMax>0&&(n<rMin||n>rMax)){
    el.style.borderColor='var(--red)';
    hint.innerHTML='<span style="color:var(--red)">❌ 號碼須在 '+rMin+'～'+rMax+' 之間</span>';
    return;
  }
  const padded=String(n).padStart(pad,'0');
  const snap=await getDocs(query(collection(db,'events',eventId,'runners'),where('bibNumber','==',padded)));
  const dup=snap.docs.some(d=>d.id!==entryDocId);
  if(dup){
    el.style.borderColor='var(--red)';
    hint.innerHTML='<span style="color:var(--red)">❌ 此號碼已被使用</span>';
  }else{
    el.style.borderColor='var(--green)';
    hint.innerHTML='<span style="color:var(--green)">✅ 號碼 '+padded+' 可使用</span>';
  }
}

  groups.forEach(g=>{html+='<option value="'+esc(g)+'"'+(g===e.group?' selected':'')+'>'+esc(g)+'</option>';});

  // 家長陪同欄位
  html+='<div id="'+cardId+'_eParentalBlock" style="display:none">'
    +'<div style="padding:12px;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.3);border-radius:8px;margin-bottom:14px">'

    +'</label>'

  //（與之後改生日/組別時走同一條判斷路徑，不會有初始不判斷的問題）
  updateEditParentalBlock(cardId,gMapJson,evDate);

// 修改表單：依生日/組別更新家長陪同區塊顯示
// 判斷結果寫在 block.dataset.need（每張卡片各自獨立），
// 取代原本的全域旗標——舊寫法同時開兩張卡的編輯表單時會互相覆蓋，
// 「是否需要家長欄位」會變成最後一次判斷的那張卡的值。
window.updateEditParentalBlock=function(cardId, gMapJson, evDate){
  const block=document.getElementById(cardId+'_eParentalBlock');
  if(!block)return false;
  const set=(need)=>{block.dataset.need=need?'1':'';block.style.display=need?'':'none';return need;};
  try{
    const gMap=JSON.parse(gMapJson);
    const group=document.getElementById(cardId+'_eGroup')?.value;
    const birthday=document.getElementById(cardId+'_eBirthday')?.value.trim();
    const g=gMap[group];
    if(!g||!(g.parentalAge>0))return set(false);
    if(!(birthday&&validateBirthday(birthday)))return set(false);
    const base=evDate||new Date().getFullYear()+'-01-01';
    const age=calcAgeRunner(birthday,base);
    // 算不出年齡（日期異常）時保守隱藏——伺服器端會做最終判斷
    return set(!(age===null||age>=g.parentalAge));
  }catch(e){return set(false);}
}

window.saveEditEntry=async function(eventId,entryDocId,cardId){
  const name=document.getElementById(cardId+'_eName').value.trim();
  const gender=document.getElementById(cardId+'_eGender').value;
  const birthday=document.getElementById(cardId+'_eBirthday').value.trim();
  const phone=document.getElementById(cardId+'_ePhone').value.trim();
  const email=document.getElementById(cardId+'_eEmail').value.trim();
  const idNumber=document.getElementById(cardId+'_eIdNumber').value.trim();
  const note=document.getElementById(cardId+'_eNote').value.trim();
  const group=document.getElementById(cardId+'_eGroup').value;
  const bibEl=document.getElementById(cardId+'_eBib');
  const rangeEl=document.getElementById(cardId+'_bibRange');
  const newBibRaw=bibEl?bibEl.value.trim():'';
  let newBib='';
  if(newBibRaw){
    const n=parseInt(newBibRaw);
    if(isNaN(n)||n<1){showToast('號碼請輸入正整數','error');return;}
    const rMin=rangeEl?parseInt(rangeEl.dataset.min)||0:0;
    const rMax=rangeEl?parseInt(rangeEl.dataset.max)||0:0;
    const pad=rangeEl?parseInt(rangeEl.dataset.pad)||3:3;
    if(rMin>0&&rMax>0&&(n<rMin||n>rMax)){
      showToast('號碼須在 '+rMin+'～'+rMax+' 之間','error');
      if(bibEl)bibEl.style.borderColor='var(--red)';
      return;
    }
    newBib=String(n).padStart(pad,'0');
  }
  if(!name){showToast('姓名為必填','error');return;}
  if(birthday&&!validateBirthday(birthday)){showToast('生日格式錯誤或不合理（不能是未來日期）','error');return;}
  if(phone&&!validatePhone(phone)){showToast('手機號碼格式錯誤','error');return;}
  if(email&&!validateEmail(email)){showToast('Email格式錯誤','error');return;}
  if(idNumber&&!validateId(idNumber)){showToast('身分證格式錯誤','error');return;}
  const customFields=JSON.parse(document.getElementById(cardId+'_edit').dataset.customFields||'[]');
  const customData={};
  for(const f of customFields){
    const el=document.getElementById(cardId+'_ecf_'+f.id); if(!el)continue;
    if(f.type==='checkbox')customData[f.id]=el.checked;
    else{if(f.required&&!el.value.trim()){showToast('「'+f.label+'」為必填','error');return;}customData[f.id]=el.value.trim();}
  }
  // 家長陪同欄位：儲存前依「目前表單的組別＋生日」即時重算是否需要
  const editBox=document.getElementById(cardId+'_edit');
  const needParental=updateEditParentalBlock(cardId,editBox?.dataset.gmap||'{}',editBox?.dataset.evdate||'');
  let parentalData={};
  if(needParental){
    const consent=document.getElementById(cardId+'_eParentalConsent')?.checked||false;
    const parentName=document.getElementById(cardId+'_eParentName')?.value.trim()||'';
    const parentPhone=document.getElementById(cardId+'_eParentPhone')?.value.trim()||'';
    if(!consent){showToast('請勾選家長陪同聲明','error');return;}
    if(!parentName){showToast('請填寫緊急聯絡人姓名','error');return;}
    if(!parentPhone||!validatePhone(parentPhone)){showToast('請填寫正確的緊急聯絡人手機','error');return;}
    parentalData={parentalConsentAgreed:true,parentName,parentPhone};
  }
  try{
    // 全部交給 Cloud Function：伺服器端重新驗證身分後，原子地更新個人資料
    // 與報名資料（含改號碼的防撞號交易與家長陪同/必填欄位的伺服器端驗證）
    const res=(await httpsCallable(functions,'runnerAction')({
      eventId,entryDocId,action:'save',credentials:statusCred,
      profile:{name,gender,birthday,phone,email,idNumber,note},
      entry:{group,customData,newBib:newBib||''},
      parental:(needParental
        ?{consent:document.getElementById(cardId+'_eParentalConsent')?.checked||false,
          parentName:document.getElementById(cardId+'_eParentName')?.value.trim()||'',
          parentPhone:document.getElementById(cardId+'_eParentPhone')?.value.trim()||''}
        :null)
    })).data;
    // 憑證與快取更新（姓名/性別/生日可能被改了，之後的動作要用新值驗證）
    statusCred=res.updatedCredentials||statusCred;
    const cached=statusCache[entryDocId];
    if(cached){
      Object.assign(cached.profile,{name,gender,birthday,phone,email,idNumber,note});
      Object.assign(cached.entry,{group,customData,bibNumber:res.newBib||cached.entry.bibNumber});
    }
    showToast('已儲存修改');
    document.getElementById(cardId+'_edit').innerHTML='<div class="csv-hint">✅ 修改已儲存</div>';
  }catch(err){
    showToast('儲存失敗：'+err.message,'error');
  }
}

let lookupInited=false;
async function initLookupPage(){
  if(lookupInited)return; lookupInited=true;
  const cfg=await getDoc(doc(db,'config','active'));
  const activeId=cfg.exists()?cfg.data().eventId:null;
  const select=document.getElementById('lookupEventSelect');

  select.innerHTML='<option value="">請選擇賽事...</option>';
  snap.docs.forEach(d=>{
    const ev=d.data(); const o=document.createElement('option');
    o.value=d.id; o.textContent=ev.name+(ev.date?' ('+ev.date+')':'');
    select.appendChild(o);

window.doLookup=async function(){
  const isAll=document.getElementById('lookupAllEvents').checked;
  const eventId=document.getElementById('lookupEventSelect').value;
  const uid=document.getElementById('lookupId').value.trim();
  const idNum=document.getElementById('lookupIdNum').value.trim();
  const birthday=document.getElementById('lookupBirthday').value.trim();
  const result=document.getElementById('lookupResult');
  if(!birthday){showToast('請填寫生日','error');return;}
  if(!validateBirthday(birthday)){showToast('生日格式錯誤（yyyy/mm/dd）','error');return;}
  if(!uid&&!idNum){showToast('請輸入 ID 或身分證字號（擇一）','error');return;}
  if(!isAll&&!eventId){showToast('請先選擇賽事','error');return;}
  result.innerHTML='<div class="card"><div class="loading-cell">查詢中...</div></div>';

  // 身分比對改由 Cloud Function（runnerLookup）在伺服器端處理：
  // 選手主檔（含個資）已不開放讀取，伺服器驗證「(ID 或身分證) + 生日」
  // 相符後，只回傳報名記錄的基本資料（姓名/編號/組別），成績明細
  // 仍由本頁讀取公開的打卡記錄組出。
  let res;
  try{
    res=(await httpsCallable(functions,'runnerLookup')({
      eventId:isAll?'all':eventId, uid, idNumber:idNum, birthday
    })).data;
  }catch(err){
    result.innerHTML='<div class="card"><div class="loading-cell" style="color:var(--red)">查詢失敗：'+esc(err.message)+'</div></div>';
    return;
  }
  const matched=res.matched||[];
  if(!matched.length){result.innerHTML='<div class="card"><div class="loading-cell" style="color:var(--red)">查無資料，請確認填寫的資料是否正確</div></div>';return;}

  // 依賽事分組（同一場找到多筆時，提示同時輸入 ID 和身分證）
  const byEvent=new Map();
  matched.forEach(m=>{
    if(!byEvent.has(m.eventId))byEvent.set(m.eventId,{evName:m.evName,evDate:m.evDate,items:[]});
    byEvent.get(m.eventId).items.push(m);
  });
  let html='';
  for(const [evId,grp] of byEvent){
    if(grp.items.length>1){
      html+='<div class="card"><div style="font-size:.85rem;color:var(--muted)">'+esc(grp.evName)+'（'+esc(grp.evDate||'日期不詳')+'）</div><div style="color:var(--accent);font-size:.85rem;margin-top:4px">找到多筆符合資料，請同時輸入 ID 和身分證字號</div></div>';
      continue;
    }
    html+=await buildLookupCard(grp.items[0].entry, evId, isAll?{name:grp.evName,date:grp.evDate}:null);
  }
  result.innerHTML=html;
}
async function buildLookupCard(e, eventId, evData){
  const recSnap=await getDocs(query(collection(db,'events',eventId,'records'),orderBy('scanTime','asc')));
  const allRecs=recSnap.docs.map(d=>d.data()).filter(x=>x.uniqueId===e.uniqueId);
  const gSnap=await getDocs(collection(db,'events',eventId,'groups'));
  const groupStations={};
  gSnap.docs.forEach(d=>{groupStations[d.data().name]=d.data().stations||[];});
  const stations=groupStations[e.group]||[];

  const evTitle=evData?'<div style="font-size:.75rem;color:var(--muted);margin-bottom:8px">'+esc(evData.name)+(evData.date?' ・ '+esc(evData.date):'')+'</div>':'';

  let html='<div class="card">'+evTitle
    +'<div class="runner-card-header">'
    +'<strong style="font-size:1.05rem">'+esc(e.name||'')+'</strong>'
    +'<span class="badge">'+esc(e.group||'-')+'</span>'
    +'<span class="badge">編號 '+esc(e.bibNumber||'-')+'</span>'
    +'</div>';
  if(!allRecs.length){html+='<p style="color:var(--muted);font-size:.85rem;margin-top:8px">尚無打卡記錄</p></div>';return html;}
  html+='<div class="station-stats" style="margin-top:10px">';
  const firstRec=allRecs[0];
  let prevRec=null;
  stations.forEach((s,i)=>{
    const rec=allRecs.find(x=>x.station===s);
    const arrived=!!rec;
    const total=arrived&&i>0?diffHMS(rec.scanTime,firstRec.scanTime):null;
    // 第二站（i===1）區段時間 = 累積時間，省略不顯示；第三站以後才顯示區段時間
    const seg=arrived&&i>1&&prevRec?diffHMS(rec.scanTime,prevRec.scanTime):null;
    if(arrived) prevRec=rec;
    html+='<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)">'
      +'<span class="station-num" style="background:'+(arrived?'var(--green)':'var(--surface2)')+';color:'+(arrived?'#fff':'var(--muted)')+';">'+(i+1)+'</span>'
      +'<span style="flex:1;font-size:.88rem">'+esc(s)+'</span>'
      +(arrived
        ?'<span style="font-family:var(--mono);font-size:.82rem">'+fmt(rec.scanTime)+'</span>'
          +(total?'<span style="font-family:var(--mono);font-size:.78rem;color:var(--muted);margin-left:8px">累積 '+total+'</span>':'')
          +(seg?'<span style="font-family:var(--mono);font-size:.78rem;color:var(--accent);margin-left:6px">區段 '+seg+'</span>':'')
        :'<span style="color:var(--muted);font-size:.82rem">未到</span>')
      +'</div>';
  });
  html+='</div></div>';
  return html;
}
